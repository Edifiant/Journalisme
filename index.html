<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Journalisme - Cahier de Révisions</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* --- QUIZ TYPES --- */
        .quiz-select {
            width: 100%; padding: 15px; font-size: 1rem;
            border: 2px solid var(--card-border); border-radius: 12px;
            background: var(--opt-bg); color: var(--texte);
            margin: 15px 0; cursor: pointer; font-family: 'Inter', sans-serif;
        }
        .quiz-select.success { background-color: #dcfce7; border-color: #166534; color: #166534; }
        .quiz-select.error { background-color: #fee2e2; border-color: #991b1b; color: #991b1b; }

        .drag-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .drag-item {
            padding: 12px 20px; background: var(--opt-bg); border: 2px solid var(--violet);
            border-radius: 10px; cursor: grab; font-weight: 600; transition: transform 0.2s;
            touch-action: none; user-select: none;
        }
        .drag-item:active { cursor: grabbing; transform: scale(0.95); }
        .drag-item.success { background: #dcfce7; border-color: #166534; color: #166534; }
        .drag-item.error { background: #fee2e2; border-color: #991b1b; color: #991b1b; }

        .drop-zone {
            width: 100%; min-height: 100px; border: 3px dashed var(--card-border);
            border-radius: 12px; background: var(--highlight-bg);
            display: flex; align-items: center; justify-content: center;
            margin: 15px 0; color: var(--texte-sec); font-weight: bold; transition: background 0.3s;
        }
        .drop-zone.dragover { background: #e0e7ff; border-color: var(--bleu); }
        .drop-zone.success { background: #dcfce7; border-style: solid; border-color: #166534; }
        .drop-zone.error { background: #fee2e2; border-style: solid; border-color: #991b1b; }

        /* --- FLASHCARDS --- */
        .flashcards-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; margin-bottom: 30px;
        }
        .flashcard-wrapper { perspective: 1000px; min-height: 320px; }
        .flashcard {
            width: 100%; height: 100%; position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d; cursor: pointer;
        }
        .flashcard.flipped { transform: rotateY(180deg); }
        .flashcard-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 16px; border: 2px solid var(--card-border);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 25px;
            box-sizing: border-box; display: flex; flex-direction: column;
        }
        .flashcard-front {
            background: var(--nav-bg); align-items: center;
            justify-content: center; text-align: center;
        }
        .flashcard-front .card-icon { font-size: 3.5rem; margin-bottom: 15px; }
        .flashcard-front h2 { margin: 0; color: var(--bleu); font-size: 1.5rem; border: none; }
        .click-hint { font-size: 0.85rem; color: var(--texte-sec); margin-top: auto; opacity: 0.7; font-weight: 600; }
        .flashcard-back {
            background: var(--bristol); transform: rotateY(180deg);
            background-image: linear-gradient(var(--ligne) 1px, transparent 1px);
            background-size: 100% 2.6rem; line-height: 2.6rem; justify-content: flex-start;
            overflow: hidden;
        }
        .flashcard-back .info-highlight { padding: 8px 15px; margin-top: 10px; line-height: 1.4; }

        :root {
            --bg: #f8fafc; --bristol: #ffffff; --marge: #fb7185; --ligne: #e2e8f0;
            --bleu: #2563eb; --violet: #7c3aed; --vert: #10b981; --orange: #f59e0b;
            --texte: #1e293b; --texte-sec: #334155; --card-border: #e2e8f0;
            --nav-bg: #ffffff; --nav-text: #1e293b; --highlight-bg: #f1f5f9;
            --quiz-bg: #ffffff; --opt-bg: #f8fafc; --opt-hover: #eff6ff;
        }
        body.dark-mode {
            --bg: #0f172a; --bristol: #1e293b; --marge: #be123c; --ligne: #334155;
            --bleu: #60a5fa; --violet: #a78bfa; --vert: #34d399; --orange: #fbbf24;
            --texte: #f1f5f9; --texte-sec: #cbd5e1; --card-border: #334155;
            --nav-bg: #1e293b; --nav-text: #f1f5f9; --highlight-bg: #334155;
            --quiz-bg: #1e293b; --opt-bg: #0f172a; --opt-hover: #1e293b;
        }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--texte); transition: background 0.3s, color 0.3s; padding-top: 80px; }
        .container { max-width: 850px; margin: 0 auto; position: relative; }

        .top-bar {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--card-border); padding: 10px 20px; z-index: 999;
            display: flex; justify-content: space-between; align-items: center;
        }
        body.dark-mode .top-bar { background: rgba(15,23,42,0.9); }

        .score-display { font-weight: 800; font-size: 1.2rem; color: var(--violet); }
        .theme-toggle { background: transparent; border: 2px solid var(--card-border); color: var(--texte); padding: 5px 10px; border-radius: 20px; cursor: pointer; }

        .main-title { text-align: center; font-size: 2.6rem; font-weight: 900; margin: 20px 0 8px 0; color: var(--texte); letter-spacing: -0.05em; }
        .main-subtitle { text-align: center; color: var(--texte-sec); margin-bottom: 30px; font-size: 1.05rem; }
        .nav-menu { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; justify-content: center; }
        .nav-btn { padding: 10px 20px; border-radius: 50px; border: 2px solid var(--btn-color); background: var(--nav-bg); color: var(--btn-color); cursor: pointer; font-weight: 700; transition: all 0.2s ease; }
        .nav-btn:hover, .nav-btn.active { background: var(--btn-color); color: white; transform: translateY(-2px); }

        .trophy-shelf { display: flex; justify-content: center; gap: 15px; margin: 20px 0; flex-wrap: wrap; }
        .trophy-card { background: var(--bristol); border: 2px solid var(--card-border); padding: 10px; border-radius: 12px; text-align: center; width: 90px; opacity: 0.2; filter: grayscale(1); transition: all 0.5s ease; }
        .trophy-card.unlocked { opacity: 1; filter: grayscale(0); border-color: var(--orange); transform: scale(1.05); box-shadow: 0 5px 15px rgba(245,158,11,0.2); }
        .trophy-icon { font-size: 1.8rem; display: block; }
        .trophy-name { font-size: 0.65rem; font-weight: bold; margin-top: 5px; color: var(--texte); }

        .fiche-bristol {
            background: var(--bristol); border: 1px solid var(--card-border); margin-bottom: 30px;
            padding: 45px 35px 45px 80px; position: relative;
            background-image: linear-gradient(var(--ligne) 1px, transparent 1px);
            background-size: 100% 2.6rem; line-height: 2.6rem; border-radius: 12px;
        }
        .fiche-bristol::before { content: ""; position: absolute; top: 0; left: 65px; bottom: 0; width: 2px; background: var(--marge); opacity: 0.6; }
        .fiche-bristol h2 { margin: 0 0 0.8rem 0; color: var(--bleu); font-size: 1.8rem; border-bottom: 3px solid var(--bleu); display: inline-block; line-height: 1.2; }
        .badge-info { background: var(--violet); color: white; padding: 4px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; display: inline-block; margin-bottom: 12px; line-height: 1; }
        .info-highlight { background: var(--highlight-bg); padding: 10px 15px; border-radius: 8px; border-left: 5px solid var(--violet); line-height: 1.5; margin-top: 15px; color: var(--texte); }
        .vigilance-box { background: #fff1f2; padding: 20px; border-radius: 12px; border-left: 6px solid var(--marge); margin-top: 20px; line-height: 1.6; color: #991b1b; }

        .card-quiz { background: var(--quiz-bg); padding: 30px; border-radius: 16px; border: 1px solid var(--card-border); border-top: 8px solid var(--violet); margin-bottom: 25px; }
        .quiz-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 20px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-btn { padding: 16px; border: 2px solid var(--card-border); border-radius: 12px; background: var(--opt-bg); cursor: pointer; font-weight: 600; text-align: left; transition: all 0.2s; font-size: 1rem; color: var(--texte); }
        .opt-btn.success { background: #dcfce7 !important; border-color: #166534 !important; color: #166534 !important; }
        .opt-btn.error { background: #fee2e2 !important; border-color: #991b1b !important; color: #991b1b !important; }
        .expli-box { margin-top: 20px; padding: 20px; background: #eff6ff; border-left: 6px solid var(--bleu); border-radius: 8px; display: none; line-height: 1.6; color: #1e293b; }

        .final-score-box { text-align: center; padding: 40px; background: var(--bg); border: 4px dashed var(--violet); border-radius: 20px; margin-top: 40px; display: none; }
        .big-score { font-size: 3rem; font-weight: 900; color: var(--violet); display: block; margin: 10px 0; }

        /* --- TEXTE LIBRE --- */
        .text-libre-wrap { display: flex; gap: 10px; align-items: center; margin-top: 15px; flex-wrap: wrap; }
        .text-libre-input {
            flex: 1; min-width: 200px; padding: 14px 18px; font-size: 1rem;
            font-family: 'Inter', sans-serif; border: 2px solid var(--card-border);
            border-radius: 12px; background: var(--opt-bg); color: var(--texte); transition: border-color 0.2s;
        }
        .text-libre-input:focus { outline: none; border-color: var(--violet); }
        .text-libre-input.success { background: #dcfce7; border-color: #166534; color: #166534; font-weight: 700; }
        .text-libre-input.error { background: #fee2e2; border-color: #991b1b; color: #991b1b; }
        .text-libre-btn {
            padding: 14px 24px; background: var(--violet); color: white;
            border: none; border-radius: 12px; font-weight: 700; font-size: 1rem;
            cursor: pointer; white-space: nowrap; transition: opacity 0.2s;
        }
        .text-libre-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- PHRASE À TROUS --- */
        .phrase-trous { font-size: 1.1rem; line-height: 2.5; margin: 15px 0; }
        .trou-input {
            border: none; border-bottom: 3px solid var(--violet);
            background: transparent; color: var(--texte); font-size: 1.1rem;
            font-family: 'Inter', sans-serif; font-weight: 700;
            width: 130px; text-align: center; outline: none; padding: 4px 8px;
            transition: border-color 0.2s;
        }
        .trou-input:focus { border-bottom-color: var(--bleu); }
        .trou-input.success { border-bottom-color: #166534; color: #166534; }
        .trou-input.error { border-bottom-color: #991b1b; color: #991b1b; }
        .valider-trous-btn {
            margin-top: 15px; padding: 12px 24px; background: var(--violet); color: white;
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1rem;
        }
        .valider-trous-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- MODE EXAMEN --- */
        .exam-banner {
            position: fixed; top: 60px; left: 0; right: 0;
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            color: white; text-align: center; padding: 10px 20px;
            font-weight: 800; font-size: 1rem; z-index: 998;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(124,58,237,0.4);
        }
        .exam-timer { font-size: 1.4rem; font-weight: 900; letter-spacing: 2px; font-variant-numeric: tabular-nums; background: rgba(255,255,255,0.2); padding: 4px 16px; border-radius: 30px; }
        .exam-timer.warning { background: rgba(239,68,68,0.5); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
        .opt-btn.selected-exam { background: #e0e7ff !important; border-color: #4f46e5 !important; color: #3730a3 !important; font-weight: 800; }
        body.dark-mode .opt-btn.selected-exam { background: #312e81 !important; border-color: #818cf8 !important; color: #c7d2fe !important; }
        .quiz-select.selected-exam { background: #e0e7ff; border-color: #4f46e5; color: #3730a3; }
        .drag-item.selected-exam { background: #e0e7ff; border-color: #4f46e5; color: #3730a3; }
        .drop-zone.selected-exam { background: #e0e7ff; border-style: solid; border-color: #4f46e5; }
        .exam-submit-btn {
            display: block; width: 100%; padding: 20px;
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            color: white; font-size: 1.2rem; font-weight: 900;
            border: none; border-radius: 16px; cursor: pointer;
            margin-top: 30px; transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(124,58,237,0.3);
        }
        .exam-submit-btn:hover { transform: translateY(-3px); }
        #examModeBtn.active { background: linear-gradient(135deg, #7c3aed, #2563eb) !important; color: white !important; border-color: transparent !important; }
        .exam-timer-setup { background: var(--bristol); border: 2px solid var(--violet); border-radius: 16px; padding: 30px; margin-bottom: 25px; text-align: center; }
        .exam-timer-setup h3 { color: var(--violet); margin: 0 0 20px; font-size: 1.4rem; }
        .timer-options { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
        .timer-opt-btn { padding: 12px 20px; border: 2px solid var(--violet); border-radius: 12px; background: var(--opt-bg); color: var(--violet); font-weight: 700; cursor: pointer; font-size: 1rem; transition: all 0.2s; }
        .timer-opt-btn.selected, .timer-opt-btn:hover { background: var(--violet); color: white; }
        body.exam-active { padding-top: 115px; }

        /* --- MODAL --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: var(--bristol); border-radius: 20px; padding: 35px; max-width: 480px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .modal-box h3 { margin: 0 0 10px; color: var(--texte); font-size: 1.4rem; }
        .modal-box p { color: var(--texte-sec); margin: 0 0 20px; line-height: 1.5; }
        .modal-input { width: 100%; box-sizing: border-box; padding: 14px 18px; border: 2px solid var(--card-border); border-radius: 12px; font-size: 1rem; font-family: 'Inter', sans-serif; background: var(--opt-bg); color: var(--texte); margin-bottom: 20px; }
        .modal-input:focus { outline: none; border-color: var(--violet); }
        .modal-btn-row { display: flex; gap: 10px; }
        .modal-btn-primary { flex: 1; padding: 14px; background: var(--violet); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1rem; }
        .modal-btn-secondary { flex: 1; padding: 14px; background: var(--opt-bg); color: var(--texte); border: 2px solid var(--card-border); border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1rem; }
        .modal-scores-preview { background: var(--highlight-bg); border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .score-line { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--card-border); font-size: 0.9rem; color: var(--texte-sec); }
        .score-line:last-child { border-bottom: none; }
        .score-val { font-weight: 800; color: var(--violet); }
        .score-total { font-weight: 800; color: var(--texte); }
        .copy-confirm { color: #10b981; font-size: 0.85rem; text-align: center; margin-top: 10px; display: none; font-weight: 700; }

        .score-line { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--card-border); font-size: 0.9rem; color: var(--texte-sec); }
        .score-line:last-child { border-bottom: none; }
        .score-val { font-weight: 800; color: var(--violet); }
        .score-total { font-weight: 800; color: var(--texte); font-size: 1rem; }
        .score-done { color: var(--vert) !important; }
        .score-pending { color: #94a3b8 !important; font-style: italic; }
        .copy-confirm { color: #10b981; font-size: 0.85rem; text-align: center; margin-top: 10px; display: none; font-weight: 700; padding: 10px; background: #dcfce7; border-radius: 8px; }
        .send-status { text-align: center; padding: 14px; border-radius: 12px; margin-top: 10px; font-weight: 700; display: none; }
        .send-status.ok  { background: #dcfce7; color: #166534; }
        .send-status.err { background: #fee2e2; color: #991b1b; }
        .modal-input-label { font-size: 0.8rem; font-weight: 700; color: var(--texte-sec); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: block; }
        .teacher-email-note { font-size: 0.8rem; color: var(--texte-sec); margin-top: -10px; margin-bottom: 15px; } { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(0.95); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
        .is-shuffling { animation: shuffleAnim 0.4s ease-out; }

        @media (max-width: 600px) { .btn-grid { grid-template-columns: 1fr; } .main-title { font-size: 2rem; } .fiche-bristol { padding: 30px 20px 30px 50px; } .fiche-bristol::before { left: 40px; } }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="score-display" id="scoreBoard"></div>
    <div style="display:flex; gap:10px;">
        <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙</button>
        <button class="theme-toggle" id="examModeBtn" onclick="toggleExamMode()" style="border-color:var(--violet); color:var(--violet); font-weight:bold;">📝 Mode Examen</button>
        <button class="theme-toggle" onclick="downloadStyledResults()" style="border-color:var(--violet); color:var(--violet); font-weight:bold;">🎓 Bilan</button>
        <button class="theme-toggle" onclick="openSendModal()" style="border-color:#10b981; color:#10b981; font-weight:bold;">📤 Envoyer</button>
    </div>
</div>

<div class="container">
    <h1 class="main-title">📰 Le Journalisme</h1>
    <p class="main-subtitle">Comprendre les médias et l'information</p>
    <div class="nav-menu" id="menu"></div>

    <div class="trophy-shelf" id="trophyShelf">
        <div class="trophy-card" id="t-first"><span class="trophy-icon">🎯</span><span class="trophy-name">Premier Pas</span></div>
        <div class="trophy-card" id="t-half"><span class="trophy-icon">🥈</span><span class="trophy-name">Bonne note</span></div>
        <div class="trophy-card" id="t-perfect"><span class="trophy-icon">🏆</span><span class="trophy-name">Sans Faute</span></div>
        <div class="trophy-card" id="t-speed"><span class="trophy-icon">⚡</span><span class="trophy-name">Expert</span></div>
    </div>

    <div id="app">Chargement...</div>
    <div id="finalResult" class="final-score-box"></div>
</div>

<button id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Retour en haut" style="display:none; position:fixed; bottom:20px; right:20px; z-index:1000; background-color:#2563eb; color:white; border:none; border-radius:50%; width:50px; height:50px; font-size:20px; cursor:pointer; box-shadow:0 4px 8px rgba(0,0,0,0.2);">↑</button>

<script>
// ==========================================
// --- DONNÉES : 5 SECTIONS DE JOURNALISME ---
// ==========================================

const DATA = {

"✍️ Testez vos connaissances": [
    { Type:"QCM", Titre:"Mission du journaliste — Quelle est-elle ?", Question:"Quelle est la principale mission d'un journaliste ?", Réponse_A:"Divertir le public à tout prix", Réponse_B:"Collecter, vérifier et transmettre des informations au public", Réponse_C:"Défendre les intérêts d'un parti politique", Réponse_D:"Créer des publicités pour les marques", Bonne_Réponse:"B", Explication:"Le journaliste a pour mission fondamentale d'informer le public en collectant, vérifiant et transmettant des informations fiables. Il doit respecter des principes d'objectivité, d'honnêteté et d'intérêt général." },
    { Type:"QCM", Titre:"Liberté de la presse — Quel texte la protège en France ?", Question:"Quel article de la Déclaration des Droits de l'Homme protège la liberté de la presse en France ?", Réponse_A:"Article 1 – Égalité des hommes", Réponse_B:"Article 4 – La liberté politique", Réponse_C:"Article 11 – La libre communication des pensées", Réponse_D:"Article 16 – La séparation des pouvoirs", Bonne_Réponse:"C", Explication:"L'article 11 de la DDHC de 1789 garantit la libre communication des pensées et des opinions, fondement juridique de la liberté de la presse en France." },
    { Type:"DROPDOWN", Titre:"Vocabulaire — Comment s'appelle la vérification par plusieurs sources ?", Question:"Confirmer une information auprès de plusieurs sources indépendantes s'appelle :", Réponse_A:"Le montage", Réponse_B:"Le recoupement des sources", Réponse_C:"La mise en page", Réponse_D:"L'éditorialisation", Bonne_Réponse:"B", Explication:"Le recoupement des sources est une pratique essentielle du journalisme : avant de publier, un journaliste cherche à confirmer une information par au moins deux sources indépendantes." },
    { Type:"QCM", Titre:"Sigle AFP — Que signifient ces initiales ?", Question:"Que signifie l'acronyme AFP en journalisme ?", Réponse_A:"Association Française de Photographie", Réponse_B:"Agence France-Presse", Réponse_C:"Autorité Française des Publications", Réponse_D:"Agence de Formation des Professionnels", Bonne_Réponse:"B", Explication:"L'Agence France-Presse (AFP) est l'une des plus grandes agences de presse mondiales. Fondée en 1944, elle fournit des dépêches, photos et vidéos à des milliers de médias dans le monde entier." },
    { Type:"TEXTE_LIBRE", Titre:"Les 5 W — Traduire 'Who' en français", Question:"Les journalistes anglophones structurent l'info avec les '5 W'. Quel mot français correspond à 'Who' ?", Bonne_Réponse:"Qui", Explication:"Les 5 W sont : Who (Qui ?), What (Quoi ?), When (Quand ?), Where (Où ?) et Why (Pourquoi ?). En français, on parle des '5 questions fondamentales'. Tout article d'information répond à ces 5 questions." },
    { Type:"QCM", Titre:"Fake news — Quelle est la bonne définition ?", Question:"Qu'est-ce qu'une 'fake news' ?", Réponse_A:"Une information très récente publiée en urgence", Réponse_B:"Une fausse information délibérément diffusée pour tromper", Réponse_C:"Une opinion exprimée par un journaliste", Réponse_D:"Un article de presse payant", Bonne_Réponse:"B", Explication:"Une fake news est une fausse information intentionnellement créée et diffusée pour induire en erreur. Elle se distingue de l'erreur journalistique (non intentionnelle) et de la satire (clairement identifiée comme telle)." },
    { Type:"DRAGDROP", Titre:"Vocabulaire — La 'Une', c'est quelle page ?", Question:"Faites glisser : la 'Une' d'un journal désigne :", Réponse_A:"La page centrale", Réponse_B:"La page de publicité", Réponse_C:"La première page", Réponse_D:"Le supplément week-end", Bonne_Réponse:"C", Explication:"La 'Une' désigne la première page d'un journal ou d'un magazine. C'est la vitrine du journal : elle contient les titres des articles les plus importants et une ou plusieurs photos percutantes." },
    { Type:"QCM", Titre:"Carte de presse — À quoi sert-elle ?", Question:"Qu'est-ce que la carte de presse en France ?", Réponse_A:"Un abonnement à un journal", Réponse_B:"Un document reconnaissant officiellement le statut de journaliste professionnel", Réponse_C:"Un laissez-passer pour les événements sportifs", Réponse_D:"Une autorisation de photographier dans les lieux publics", Bonne_Réponse:"B", Explication:"La carte de presse est délivrée par la Commission de la carte d'identité des journalistes professionnels (CCIJP). Elle reconnaît officiellement qu'une personne exerce le journalisme comme activité principale et rémunératrice." },
    { Type:"PHRASE_TROUS", Titre:"Compléter la phrase — Faits vs opinions", Question:"En journalisme, séparer clairement les faits des opinions s'appelle la séparation des ___ journalistiques.", Bonne_Réponse:"genres", Explication:"La séparation des genres journalistiques est un principe fondamental : les informations factuelles (reportage, article d'info) doivent être clairement distinguées des textes d'opinion (éditorial, chronique, tribune). Cela garantit la transparence envers le lecteur." },
    { Type:"QCM", Titre:"Embargo — Qu'est-ce que c'est ?", Question:"Qu'est-ce qu'un embargo en journalisme ?", Réponse_A:"Une interdiction définitive de publication", Réponse_B:"Une demande de ne pas publier avant une date précise", Réponse_C:"Une censure imposée par le gouvernement", Réponse_D:"Un accord tarifaire entre journaux", Bonne_Réponse:"B", Explication:"Un embargo est une demande faite par une source de ne pas publier une information avant une date ou heure précise. Les journalistes peuvent l'accepter ou le refuser, mais ne doivent pas le violer s'ils l'ont accepté." },
    { Type:"QCM", Titre:"Source anonyme — Pourquoi le journaliste la protège-t-il ?", Question:"Pourquoi un journaliste peut-il refuser de révéler l'identité d'une de ses sources ?", Réponse_A:"Pour vendre plus d'exemplaires de son journal", Réponse_B:"Pour respecter le secret des sources qui protège ses informateurs", Réponse_C:"Parce que la loi l'interdit totalement", Réponse_D:"Pour éviter de payer des droits d'auteur", Bonne_Réponse:"B", Explication:"Le secret des sources est un droit fondamental du journaliste. Il protège les informateurs qui prennent des risques en transmettant des informations sensibles. La loi française de 2010 garantit ce secret, sauf exceptions très encadrées." },
    { Type:"QCM", Titre:"Dépêche d'agence — Qui la rédige ?", Question:"Qui rédige les dépêches d'agence utilisées par les journaux et chaînes TV ?", Réponse_A:"Les lecteurs du journal", Réponse_B:"Les journalistes des agences de presse (AFP, Reuters…)", Réponse_C:"Les communicants des entreprises", Réponse_D:"Les rédacteurs en chef des grands journaux", Bonne_Réponse:"B", Explication:"Les agences de presse (AFP, Reuters, Associated Press…) sont des entreprises spécialisées dans la collecte et la diffusion d'informations. Leurs journalistes rédigent des dépêches que les médias abonnés utilisent pour alimenter leur propre rédaction." },
    { Type:"DROPDOWN", Titre:"Vocabulaire — Comment s'appelle l'auteur de l'éditorial ?", Question:"L'éditorial d'un journal est généralement rédigé par :", Réponse_A:"Un lecteur invité", Réponse_B:"Un pigiste débutant", Réponse_C:"Le rédacteur en chef ou directeur de la rédaction", Réponse_D:"Un correspondant étranger", Bonne_Réponse:"C", Explication:"L'éditorial (ou 'édito') engage la position officielle de toute la rédaction. Il est donc rédigé par le rédacteur en chef ou le directeur de la publication, qui représentent la ligne éditoriale du journal." },
    { Type:"QCM", Titre:"Présomption d'innocence — Quand s'applique-t-elle ?", Question:"La présomption d'innocence signifie qu'une personne :", Réponse_A:"Est forcément innocente, même condamnée", Réponse_B:"Est considérée comme innocente tant qu'elle n'est pas condamnée par un tribunal", Réponse_C:"Ne peut pas être mentionnée dans la presse", Réponse_D:"Peut refuser d'être interrogée par la police", Bonne_Réponse:"B", Explication:"La présomption d'innocence est un principe fondamental du droit et du journalisme : toute personne est présumée innocente tant qu'un tribunal ne l'a pas condamnée. Les journalistes doivent respecter ce principe, notamment dans les faits divers." },
    { Type:"DRAGDROP", Titre:"Distinguer info et pub — Lequel n'est PAS du journalisme ?", Question:"Faites glisser : lequel de ces contenus N'EST PAS du journalisme ?", Réponse_A:"Un reportage de terrain", Réponse_B:"Une enquête d'investigation", Réponse_C:"Un publi-rédactionnel payé par une marque", Réponse_D:"Une interview d'expert", Bonne_Réponse:"C", Explication:"Un publi-rédactionnel (ou 'publireportage') est un contenu payé par un annonceur qui ressemble à un article de presse. Ce n'est pas du journalisme car il vise à promouvoir un produit, non à informer objectivement. Il doit obligatoirement être identifié comme publicité." },
    { Type:"QCM", Titre:"Vérification — Qu'est-ce que le fact-checking ?", Question:"Le 'fact-checking' est :", Réponse_A:"Une technique de mise en page des articles", Réponse_B:"La vérification méthodique de faits, chiffres ou déclarations", Réponse_C:"Un type de journal satirique", Réponse_D:"Un logiciel de traitement de texte journalistique", Bonne_Réponse:"B", Explication:"Le fact-checking (ou vérification des faits) consiste à vérifier rigoureusement l'exactitude de déclarations, statistiques ou informations publiées. Des médias spécialisés comme Les Décodeurs (Le Monde) ou CheckNews (Libération) s'y consacrent." },
    { Type:"QCM", Titre:"Charte de Munich — Que contient-elle ?", Question:"La charte de Munich (1971) est :", Réponse_A:"Un traité sur les droits d'auteur journalistiques", Réponse_B:"Un texte fondateur définissant les droits et devoirs des journalistes", Réponse_C:"Une loi sur la censure en temps de guerre", Réponse_D:"Un accord entre agences de presse européennes", Bonne_Réponse:"B", Explication:"La charte de Munich est une déclaration des droits et devoirs des journalistes adoptée en 1971. Elle liste 10 devoirs (exactitude, rectification, secret des sources…) et 5 droits (accès aux sources, refus de consignes contraires à l'éthique…). C'est un texte de référence de la déontologie journalistique." },
    { Type:"TEXTE_LIBRE", Titre:"Vocabulaire — Comment s'appelle un journaliste indépendant payé à l'article ?", Question:"Comment appelle-t-on un journaliste qui travaille en indépendant et est payé à l'article, sans contrat fixe avec un journal ?", Bonne_Réponse:"pigiste|un pigiste", Explication:"Un pigiste est un journaliste indépendant rémunéré à la 'pige', c'est-à-dire à l'article ou au sujet produit, sans être salarié fixe d'une rédaction. Beaucoup de journalistes débutent leur carrière comme pigistes." },
    { Type:"QCM", Titre:"Le off — Que signifie 'parler off the record' ?", Question:"Quand une source parle 'off the record' à un journaliste, cela signifie :", Réponse_A:"Qu'elle donne l'information uniquement pour enregistrement audio", Réponse_B:"Que l'information est transmise à titre confidentiel et ne peut pas être publiée telle quelle", Réponse_C:"Qu'elle refuse de répondre à toutes les questions", Réponse_D:"Que l'entretien aura lieu en dehors du bureau", Bonne_Réponse:"B", Explication:"Parler 'off the record' (ou 'en off') signifie donner une information à un journaliste à titre confidentiel : le journaliste peut s'en servir pour orienter ses recherches, mais ne peut pas citer la source ni publier directement ce qui lui a été dit." },
    { Type:"PHRASE_TROUS", Titre:"Compléter la phrase — L'indépendance du journaliste", Question:"Pour garantir son indépendance, un journaliste doit éviter tout ___ d'intérêts avec les sujets qu'il traite.", Bonne_Réponse:"conflit", Explication:"Le conflit d'intérêts est une situation où un journaliste aurait un intérêt personnel (financier, familial, politique…) qui pourrait influencer son traitement d'un sujet. Par exemple, un journaliste ne devrait pas couvrir une entreprise dont il est actionnaire." },
    { Type:"QCM", Titre:"Le droit de réponse — À qui s'adresse-t-il ?", Question:"En France, qui peut exercer un 'droit de réponse' dans un journal ?", Réponse_A:"Uniquement les personnalités politiques", Réponse_B:"Toute personne nommée ou désignée dans un article qui s'estime mal représentée", Réponse_C:"Seulement les grandes entreprises", Réponse_D:"Uniquement les journalistes de la rédaction", Bonne_Réponse:"B", Explication:"En France, la loi sur la liberté de la presse du 29 juillet 1881 garantit un droit de réponse à toute personne nommée ou désignée dans un journal. Le journal est obligé de publier cette réponse gratuitement." }
],

"📰 Les types de contenus": [
    { Type:"COURS", Titre:"La brève — Format court et factuel", Contenu:"La brève est le format le plus court du journalisme. En quelques lignes (2 à 5 maximum), elle donne une information factuelle sur un événement récent. Elle répond aux questions Qui ? Quoi ? Où ? Quand ? sans développer ni analyser.", Points_Vigilance:"Une brève ne contient pas d'opinion ni d'analyse. Elle est purement factuelle et très synthétique. Attention à ne pas la confondre avec une accroche ou un chapeau d'article." },
    { Type:"QCM", Titre:"Brève vs article — Quelle est la différence principale ?", Question:"Qu'est-ce qui distingue fondamentalement une brève d'un article d'information ?", Réponse_A:"La brève contient des photos, l'article non", Réponse_B:"La brève est courte et factuelle, l'article est développé avec contexte et analyses", Réponse_C:"La brève est écrite par le rédacteur en chef, l'article par un reporter", Réponse_D:"La brève traite de sport, l'article de politique", Bonne_Réponse:"B", Explication:"La brève se limite à quelques lignes pour livrer une information essentielle (Qui, Quoi, Où, Quand), sans développement. L'article d'information va plus loin en apportant contexte, sources citées, données et explications." },
    { Type:"COURS", Titre:"L'article d'information — Objectivité et rigueur", Contenu:"L'article d'information (ou article de presse) traite un sujet d'actualité de façon approfondie. Il répond aux 5 questions fondamentales (Qui, Quoi, Où, Quand, Pourquoi) et peut inclure des citations de sources, des données chiffrées et un contexte. Il est rédigé de façon neutre et objective.", Points_Vigilance:"Attention à ne pas confondre article d'information et article d'opinion : l'article d'information rapporte des faits vérifiés, sans que le journaliste exprime son point de vue personnel." },
    { Type:"COURS", Titre:"Le reportage — Observer et témoigner sur le terrain", Contenu:"Le reportage est un récit journalistique produit à partir d'une observation directe sur le terrain. Le journaliste se rend sur les lieux, rencontre des témoins et acteurs, et retranscrit ce qu'il voit et entend. Le reportage peut être écrit, photographique, radio ou télévisé.", Points_Vigilance:"Le journaliste reporter doit être présent sur le terrain. Il ne doit pas inventer ou embellir les faits observés. C'est ce qui distingue le reportage d'une fiction ou d'un récit romancé." },
    { Type:"QCM", Titre:"Reportage — Quelle est sa condition indispensable ?", Question:"Un journaliste rend compte d'un séisme en décrivant ce qu'il a vu sur place. De quel genre journalistique s'agit-il ?", Réponse_A:"L'éditorial", Réponse_B:"La brève", Réponse_C:"Le reportage", Réponse_D:"La tribune libre", Bonne_Réponse:"C", Explication:"Le reportage implique la présence physique du journaliste sur le terrain. Il témoigne directement de ce qu'il observe. Ce n'est pas une brève (trop courte, pas de terrain), ni un éditorial (genre d'opinion)." },
    { Type:"COURS", Titre:"L'interview — Donner directement la parole", Contenu:"L'interview est un dialogue entre un journaliste et une personnalité ou un expert, publié sous forme de questions-réponses (Q&R). Elle permet d'approfondir un sujet ou de connaître le point de vue d'un acteur clé. Différents formats existent : interview portrait, interview d'expertise, conférence de presse…" },
    { Type:"TEXTE_LIBRE", Titre:"Interview — Comment s'appelle ce format question/réponse ?", Question:"Quel genre journalistique est présenté sous forme de questions et réponses entre un journaliste et son interlocuteur ?", Bonne_Réponse:"interview|l'interview|entretien|l'entretien", Explication:"L'interview (ou entretien journalistique) se présente sous la forme classique question/réponse. Elle permet de donner directement la parole à une personnalité ou un expert. Le journaliste prépare ses questions en amont pour orienter l'échange." },
    { Type:"COURS", Titre:"L'éditorial — La voix officielle du journal", Contenu:"L'éditorial (ou 'édito') est un article d'opinion rédigé par le directeur de la rédaction ou le rédacteur en chef. Il exprime la position officielle du journal sur un sujet d'actualité. Il est clairement identifié comme un texte d'opinion.", Points_Vigilance:"L'éditorial engage toute la rédaction, pas seulement son auteur. Ne pas le confondre avec une chronique (qui engage uniquement son auteur) ou un article d'information (neutre et factuel)." },
    { Type:"COURS", Titre:"La chronique — Un point de vue régulier et signé", Contenu:"La chronique est un texte d'opinion régulier, signé par un auteur attitré (chroniqueur). Elle peut être humoristique, culturelle, sportive, politique… Le chroniqueur exprime son point de vue personnel avec un style reconnaissable. Elle ne prétend pas à l'objectivité." },
    { Type:"DRAGDROP", Titre:"Opinion ou information — Lequel est un genre d'OPINION ?", Question:"Faites glisser : lequel de ces formats est un genre d'OPINION ?", Réponse_A:"Le reportage", Réponse_B:"La brève", Réponse_C:"L'éditorial", Réponse_D:"L'article d'information", Bonne_Réponse:"C", Explication:"L'éditorial est un genre d'opinion qui engage la position du journal entier. À l'inverse, le reportage, la brève et l'article d'information sont des genres factuels qui visent l'objectivité et la neutralité." },
    { Type:"COURS", Titre:"L'enquête journalistique — Investiguer en profondeur", Contenu:"L'enquête journalistique est une investigation approfondie sur un sujet souvent sensible ou caché. Le journaliste multiplie les sources, consulte des documents, recoupe les informations. Une enquête peut prendre plusieurs semaines ou mois. Elle peut révéler des scandales ou des dysfonctionnements (journalisme d'investigation).", Points_Vigilance:"L'enquête est le genre le plus risqué pour le journaliste (pressions, menaces). Elle suppose une rigueur absolue dans la vérification, car ses révélations peuvent avoir des conséquences judiciaires et sociales majeures." },
    { Type:"COURS", Titre:"Le portrait — Raconter une personnalité", Contenu:"Le portrait est un article centré sur une personnalité. Il combine des informations biographiques, des citations directes, des témoignages de proches et de l'observation directe pour dresser un tableau vivant d'un individu. Le portrait peut être factuel ou plus littéraire." },
    { Type:"QCM", Titre:"Genres d'opinion — Lequel N'est PAS un texte d'opinion ?", Question:"Lequel de ces genres journalistiques N'exprime PAS l'opinion de son auteur ?", Réponse_A:"La chronique", Réponse_B:"L'éditorial", Réponse_C:"L'article d'information", Réponse_D:"La tribune libre", Bonne_Réponse:"C", Explication:"L'article d'information rapporte des faits vérifiés de façon neutre et objective. La chronique, l'éditorial et la tribune sont tous des genres d'opinion où l'auteur exprime explicitement son point de vue." },
    { Type:"DROPDOWN", Titre:"Identifier le format court — Lequel est une brève ?", Question:"Une brève journalistique est :", Réponse_A:"Un long article d'investigation en plusieurs parties", Réponse_B:"Une courte information factuelle de quelques lignes", Réponse_C:"Un éditorial humoristique hebdomadaire", Réponse_D:"Un entretien approfondi avec un expert", Bonne_Réponse:"B", Explication:"La brève est le format le plus court du journalisme : quelques lignes pour livrer une information essentielle, sans développement ni analyse. Elle répond aux questions Qui, Quoi, Où, Quand." },
    { Type:"QCM", Titre:"Enquête d'investigation — En quoi se distingue-t-elle ?", Question:"Qu'est-ce qui caractérise principalement le journalisme d'investigation ?", Réponse_A:"Il se base uniquement sur des sources officielles", Réponse_B:"Il révèle des informations cachées grâce à une recherche approfondie sur plusieurs semaines ou mois", Réponse_C:"Il est toujours réalisé en direct à la télévision", Réponse_D:"Il est interdit en France pour protéger la vie privée", Bonne_Réponse:"B", Explication:"Le journalisme d'investigation (ou enquête) vise à révéler ce que des acteurs veulent cacher au public. Il exige du temps, de nombreuses sources, la consultation de documents et un recoupement minutieux. Des enquêtes célèbres : le Watergate, les Panama Papers, les affaires Mediator…" },
    { Type:"PHRASE_TROUS", Titre:"Compléter la phrase — Qui rédige l'éditorial ?", Question:"L'éditorial est rédigé par le ___ en chef et exprime la position officielle de toute la rédaction.", Bonne_Réponse:"rédacteur", Explication:"L'éditorial est rédigé par le rédacteur en chef (ou directeur de la publication) et engage la position de toute la rédaction sur un sujet d'actualité. C'est ce qui le distingue de la chronique, qui n'engage que son auteur." },
    { Type:"QCM", Titre:"La tribune — Qui peut en écrire une ?", Question:"Qu'est-ce qu'une tribune libre dans un journal ?", Réponse_A:"Un article d'information neutre rédigé par la rédaction", Réponse_B:"Un texte d'opinion rédigé par un auteur extérieur à la rédaction (expert, personnalité…)", Réponse_C:"Un résumé des informations de la semaine", Réponse_D:"Un encadré publicitaire déguisé en article", Bonne_Réponse:"B", Explication:"Une tribune libre est un texte d'opinion écrit par une personne extérieure à la rédaction (intellectuel, militant, expert, personnalité…) et publié par le journal. Elle est clairement identifiée comme telle. À distinguer de l'éditorial (rédigé par la rédaction) et de la chronique (régulière et signée)." },
    { Type:"DRAGDROP", Titre:"Associer format et auteur — Qui rédige le portrait ?", Question:"Faites glisser : un portrait journalistique est centré sur :", Réponse_A:"Un événement politique", Réponse_B:"Un résultat économique", Réponse_C:"Une personnalité individuelle", Réponse_D:"Un produit à vendre", Bonne_Réponse:"C", Explication:"Le portrait journalistique est un article entièrement consacré à une personnalité. Il mêle biographie, citations directes, anecdotes et témoignages pour offrir un tableau vivant et approfondi d'un individu." }
],

"📺 Les supports": [
    { Type:"COURS", Titre:"La presse écrite — Quotidiens, hebdos, mensuels", Contenu:"La presse écrite regroupe les journaux et magazines imprimés. On distingue :\n• Les quotidiens (publiés chaque jour) : Le Monde, Le Figaro, Libération, Ouest-France…\n• Les hebdomadaires (chaque semaine) : Le Point, L'Express, Le Canard Enchaîné…\n• Les mensuels (chaque mois) : Sciences & Vie, National Geographic…\n• La presse spécialisée : L'Équipe (sport), Capital (économie), Elle (mode)…" },
    { Type:"QCM", Titre:"Presse écrite — Quelle est la fréquence d'un quotidien ?", Question:"Combien de fois par semaine paraît un journal quotidien ?", Réponse_A:"Une fois par semaine", Réponse_B:"Une fois par mois", Réponse_C:"Chaque jour (ou presque)", Réponse_D:"Deux fois par an", Bonne_Réponse:"C", Explication:"Un quotidien est publié chaque jour ou presque (généralement du lundi au samedi ou du lundi au dimanche). Exemples français : Le Monde, Le Figaro, Libération, Ouest-France, L'Équipe…" },
    { Type:"DROPDOWN", Titre:"Vocabulaire — Un journal hebdomadaire, c'est quoi ?", Question:"Un journal publié une fois par semaine s'appelle un :", Réponse_A:"Quotidien", Réponse_B:"Mensuel", Réponse_C:"Hebdomadaire", Réponse_D:"Annuel", Bonne_Réponse:"C", Explication:"Un hebdomadaire paraît chaque semaine (hebdo = semaine en latin). Exemples : Le Point, L'Express, Le Nouvel Obs, Le Canard Enchaîné. À distinguer du quotidien (chaque jour) et du mensuel (chaque mois)." },
    { Type:"COURS", Titre:"La radio — L'information sonore et immédiate", Contenu:"La radio est un média sonore de diffusion en temps réel. Elle permet une information rapide (flashs d'information, journaux toutes les heures). En France :\n• Les radios publiques : France Inter, France Info, France Culture, RFI…\n• Les radios privées généralistes : RTL, Europe 1, BFM Radio…\n• Les radios musicales avec info : NRJ, Fun Radio…\nLa radio a l'avantage d'être accessible partout (voiture, cuisine) sans nécessiter les yeux.", Points_Vigilance:"Sans images, les journalistes radio doivent créer des images mentales par les mots, les sons et les ambiances sonores (montage son, reportage de terrain)." },
    { Type:"QCM", Titre:"Radio — Quel est son avantage principal par rapport à la TV ?", Question:"Quel est l'avantage principal de la radio sur les autres médias d'information ?", Réponse_A:"Elle diffuse des images en haute définition", Réponse_B:"Elle est accessible partout et en mobilité, sans nécessiter les yeux", Réponse_C:"Elle permet aux lecteurs d'écrire des articles", Réponse_D:"Elle est toujours gratuite", Bonne_Réponse:"B", Explication:"La radio s'écoute partout : en voiture, à pied, en faisant la cuisine… Elle ne nécessite pas de regarder un écran. C'est son avantage décisif sur la télévision. France Info est la radio d'info continue la plus écoutée de France." },
    { Type:"COURS", Titre:"La télévision — L'image au service de l'information", Contenu:"La télévision associe image et son pour informer. Les formats télévisés incluent :\n• Les journaux télévisés (JT) : 20h de TF1, 20h de France 2…\n• Les chaînes d'info en continu : BFM TV, CNews, LCI, Franceinfo TV…\n• Les magazines d'information : Complément d'enquête, Envoyé Spécial…\nLa TV est très impactante grâce aux images, mais peut privilégier le spectaculaire au détriment de l'analyse.", Points_Vigilance:"Les images télévisées ont un fort pouvoir émotionnel. Un journaliste TV doit veiller à ne pas utiliser des images choc pour manipuler les émotions du téléspectateur au détriment de l'exactitude." },
    { Type:"QCM", Titre:"Chaîne d'info — Comment s'appelle ce format TV ?", Question:"Comment appelle-t-on une chaîne de télévision qui diffuse de l'information 24 heures sur 24 ?", Réponse_A:"Une chaîne culturelle", Réponse_B:"Une chaîne d'info en continu", Réponse_C:"Un journal télévisé", Réponse_D:"Une radio-télévision", Bonne_Réponse:"B", Explication:"Une chaîne d'info en continu diffuse des informations 24h/24. En France : BFMTV, CNews, LCI, et Franceinfo. Ces chaînes font une large place aux débats, aux directs et aux breaking news." },
    { Type:"COURS", Titre:"La presse en ligne — Web et pure players", Contenu:"La presse en ligne publie sur internet, en continu 24h/24. Elle permet :\n• Une mise à jour immédiate de l'information\n• L'intégration de vidéos, sons, infographies et liens hypertexte\n• L'interactivité avec les lecteurs (commentaires, partages)\nExemples : lemonde.fr, lefigaro.fr, mediapart.fr…\nLes pure players sont des médias uniquement numériques, sans version papier : Mediapart, Brut, Konbini…", Points_Vigilance:"La vitesse de publication sur le web peut nuire à la vérification des informations. Attention aux articles non sourcés, non datés ou rédigés sans signature." },
    { Type:"QCM", Titre:"Pure player — Quelle est sa particularité ?", Question:"Qu'est-ce qu'un 'pure player' dans la presse ?", Réponse_A:"Un journaliste sportif ultra-spécialisé", Réponse_B:"Un média uniquement numérique, sans version papier", Réponse_C:"Une émission de radio en direct", Réponse_D:"Un journal gratuit distribué dans le métro", Bonne_Réponse:"B", Explication:"Un pure player est un média 100% numérique, né sur Internet et sans version imprimée. Exemples : Mediapart (enquêtes), Brut (vidéos courtes pour les jeunes), Konbini, Slate.fr…" },
    { Type:"COURS", Titre:"Le podcast — L'audio à la demande", Contenu:"Le podcast est un contenu audio à la demande, téléchargeable et écouté quand on veut. Il peut être :\n• D'information : Les Matins de France Culture, Le Monde Podcast\n• D'investigation : Affaires Sensibles (France Inter)\n• De décryptage : L'Heure du Monde\n• De narration sonore : Transfert (Slate)\nLe podcast offre un format long et approfondi, différent des flashs d'info rapides." },
    { Type:"DRAGDROP", Titre:"Identifier le bon support — Écouter en différé, c'est quoi ?", Question:"Faites glisser : quel support permet d'écouter un contenu journalistique n'importe quand, en différé ?", Réponse_A:"Le journal télévisé en direct", Réponse_B:"Le journal radio en direct", Réponse_C:"Le podcast", Réponse_D:"La dépêche AFP", Bonne_Réponse:"C", Explication:"Le podcast est un contenu audio en différé : on le télécharge ou streame quand on veut. Il s'oppose à la radio en direct et au journal télévisé, qui sont diffusés à des horaires fixes." },
    { Type:"COURS", Titre:"Les réseaux sociaux — Canaux de diffusion et risques", Contenu:"Les réseaux sociaux (X/Twitter, Instagram, Facebook, TikTok…) sont devenus des canaux de diffusion de l'information. Ils permettent une viralité immédiate. Cependant :\n• Les médias et journalistes les utilisent pour diffuser leur travail\n• Mais ils favorisent aussi les rumeurs, les fake news et les bulles de filtre\n• Les algorithmes privilégient l'émotion et le sensationnel\nL'éducation aux médias inclut l'apprentissage du regard critique sur les réseaux.", Points_Vigilance:"Un post sur les réseaux sociaux n'est pas du journalisme. Il faut distinguer un article vérifié par une rédaction d'un contenu créé par n'importe qui sans vérification." },
    { Type:"QCM", Titre:"Presse régionale — Lequel est un quotidien régional ?", Question:"Lequel de ces journaux est un exemple de Presse Quotidienne Régionale (PQR) ?", Réponse_A:"Le Monde", Réponse_B:"Libération", Réponse_C:"Le Figaro", Réponse_D:"Ouest-France", Bonne_Réponse:"D", Explication:"Ouest-France est le premier quotidien français par son tirage total (700 000 exemplaires/jour), mais c'est un journal régional (Normandie, Bretagne, Pays de la Loire…). Le Monde, Libération et Le Figaro sont des quotidiens nationaux." },
    { Type:"PHRASE_TROUS", Titre:"Compléter la phrase — Quel média combine image et son ?", Question:"La ___ est un média qui associe images et sons pour informer le public, notamment via les journaux télévisés diffusés le soir.", Bonne_Réponse:"télévision|television|TV", Explication:"La télévision combine l'image et le son, ce qui lui confère un fort pouvoir d'impact émotionnel. Les journaux télévisés (JT) du 20h de TF1 ou France 2 sont suivis par plusieurs millions de téléspectateurs chaque soir." },
    { Type:"QCM", Titre:"Réseaux sociaux — Sont-ils une source fiable par défaut ?", Question:"Pourquoi un journaliste ne peut-il pas citer un tweet ou un post Instagram comme source fiable en soi ?", Réponse_A:"Parce que les réseaux sociaux sont illégaux en France", Réponse_B:"Parce qu'un post n'est pas vérifié et peut être faux, parodique ou sorti de son contexte", Réponse_C:"Parce que seuls les journaux imprimés ont valeur légale", Réponse_D:"Parce que les algorithmes empêchent les journalistes d'y accéder", Bonne_Réponse:"B", Explication:"Les réseaux sociaux sont des espaces où tout le monde publie sans vérification. Un journaliste doit recouper une information trouvée sur les réseaux avec d'autres sources fiables avant de la publier, et ne jamais se contenter d'un seul post comme preuve." },
    { Type:"TEXTE_LIBRE", Titre:"Vocabulaire — Comment s'appelle la 1ère page d'un journal ?", Question:"Comment appelle-t-on la première page d'un journal, qui résume les sujets les plus importants du jour ?", Bonne_Réponse:"la une|une|la Une|Une", Explication:"La 'Une' (ou 'une') désigne la première page d'un journal ou magazine. C'est la vitrine du titre : elle présente les titres et photos des articles jugés les plus importants. 'Faire la une' signifie figurer en tête de l'actualité." },
    { Type:"DRAGDROP", Titre:"Distinguer radio et podcast — Quelle est la différence clé ?", Question:"Faites glisser : par rapport à la radio, le podcast a l'avantage d'être :", Réponse_A:"Toujours diffusé en direct", Réponse_B:"Uniquement accessible en voiture", Réponse_C:"Disponible à la demande, quand on veut", Réponse_D:"Produit uniquement par des radios publiques", Bonne_Réponse:"C", Explication:"La différence fondamentale entre radio et podcast : la radio diffuse en direct à des horaires précis, tandis que le podcast est disponible à la demande. On écoute un podcast quand on veut, autant de fois qu'on veut, en le téléchargeant ou le streamant." }
],

"🔍 Les domaines traités": [
    { Type:"COURS", Titre:"Le journalisme politique — Couvrir le pouvoir", Contenu:"Le journalisme politique couvre l'actualité des institutions (gouvernement, parlement, partis politiques), des élections, des débats législatifs et des relations entre pouvoirs. Il inclut les interviews de politiciens, la couverture de campagnes électorales, l'analyse des programmes…", Points_Vigilance:"Le journaliste politique doit éviter la connivence avec les acteurs politiques qu'il suit. Il ne doit pas prendre parti pour un camp politique et doit accorder un traitement équitable aux différentes formations." },
    { Type:"QCM", Titre:"Journalisme politique — Quelle est son erreur à éviter ?", Question:"Quelle est la principale faute déontologique à éviter pour un journaliste politique ?", Réponse_A:"Interviewer des élus de partis opposés", Réponse_B:"Devenir trop proche et complice des politiciens qu'il couvre (connivence)", Réponse_C:"Couvrir les élections locales", Réponse_D:"Citer les programmes officiels des partis", Bonne_Réponse:"B", Explication:"La connivence est le risque majeur du journalisme politique : un journaliste qui fréquente trop les politiciens peut finir par les ménager plutôt que de les questionner avec rigueur. C'est une dérive qui nuit à l'indépendance et à l'intérêt public." },
    { Type:"COURS", Titre:"Le journalisme économique — Décrypter l'argent et le travail", Contenu:"Le journalisme économique traite des entreprises, des marchés financiers, du commerce, de l'emploi, des politiques économiques et de la consommation. Il s'adresse à des lecteurs spécialisés (Les Échos, Le Revenu) mais aussi au grand public (rubriques économie du Monde ou du Figaro…). Il doit vulgariser des sujets complexes." },
    { Type:"COURS", Titre:"Le journalisme culturel — Critiquer et valoriser les arts", Contenu:"Le journalisme culturel couvre les arts, le cinéma, la musique, la littérature, le théâtre, les expositions… Il prend plusieurs formes :\n• La critique (évaluation d'une œuvre par un journaliste-critique)\n• L'interview d'artiste\n• Le reportage culturel (backstage d'un tournage, coulisses d'un festival)\n• L'agenda culturel\nLes journalistes culturels sont souvent des spécialistes de leur domaine." },
    { Type:"QCM", Titre:"Journalisme culturel — Quel sujet relève de ce domaine ?", Question:"Un journaliste couvre la sortie d'un roman primé au Prix Goncourt et interviewe son auteur. Dans quel domaine travaille-t-il ?", Réponse_A:"Faits divers", Réponse_B:"Politique", Réponse_C:"Économie", Réponse_D:"Culture", Bonne_Réponse:"D", Explication:"La couverture d'un prix littéraire et d'un auteur relève du journalisme culturel, qui traite des arts, de la littérature, du cinéma, de la musique et des autres manifestations culturelles et artistiques." },
    { Type:"COURS", Titre:"Le journalisme sportif — Des résultats aux coulisses", Contenu:"Le journalisme sportif couvre les compétitions, les résultats, les coulisses des clubs et fédérations, les enjeux économiques du sport professionnel. Il comprend :\n• Les reportages live et commentaires\n• Les analyses tactiques\n• Les interviews d'athlètes\n• Les enquêtes sur le dopage, la corruption…\nL'Équipe, RMC Sport ou Canal+ sont des exemples de médias spécialisés dans le sport." },
    { Type:"COURS", Titre:"Le journalisme de société — Comprendre les évolutions sociales", Contenu:"Le journalisme de société traite des phénomènes sociaux : éducation, santé, environnement, justice, immigration, pauvreté, inégalités, modes de vie… Il cherche à comprendre les évolutions de la société et à donner la parole à ceux qui sont peu entendus. C'est souvent un journalisme 'de terrain' proche des gens.", Points_Vigilance:"Ce domaine implique souvent de traiter des sujets sensibles (précarité, discrimination, santé mentale…) qui nécessitent empathie, respect des personnes interviewées et rigueur dans le traitement." },
    { Type:"QCM", Titre:"Journalisme de société — Quel sujet relève de ce domaine ?", Question:"Lequel de ces sujets relève du journalisme de société ?", Réponse_A:"Les résultats du championnat de football", Réponse_B:"La montée de la pauvreté dans les quartiers populaires", Réponse_C:"L'analyse du budget de l'État", Réponse_D:"La critique d'un film au cinéma", Bonne_Réponse:"B", Explication:"Le journalisme de société traite des réalités sociales : pauvreté, inégalités, education, santé, modes de vie… La montée de la pauvreté est un sujet de société. Le foot = sport, le budget = économie, la critique de film = culture." },
    { Type:"COURS", Titre:"Le journalisme scientifique — Vulgariser sans trahir", Contenu:"Le journalisme scientifique vulgarise les découvertes et avancées de la recherche pour le grand public. Il couvre la médecine, les technologies, l'environnement, l'astronomie, la biologie… Le journaliste scientifique doit comprendre des sujets complexes pour les traduire en langage accessible.", Points_Vigilance:"Le journaliste scientifique doit distinguer les résultats publiés dans des revues validées par des pairs (peer-reviewed) d'études non validées, de pseudosciences ou de communiqués de presse d'entreprises." },
    { Type:"QCM", Titre:"Journalisme scientifique — Quelle est sa principale difficulté ?", Question:"Quelle est la difficulté principale du journalisme scientifique ?", Réponse_A:"Il n'y a jamais d'événements scientifiques à couvrir", Réponse_B:"Vulgariser des sujets complexes sans les déformer ni les simplifier à l'excès", Réponse_C:"Les scientifiques refusent systématiquement de parler aux journalistes", Réponse_D:"Les sujets scientifiques n'intéressent jamais le grand public", Bonne_Réponse:"B", Explication:"La vulgarisation est le défi central du journalisme scientifique : traduire des résultats complexes en langage compréhensible pour tous, sans simplifier à l'excès ni créer de fausses impressions. Trop simplifier peut conduire à des erreurs ou à de la désinformation." },
    { Type:"COURS", Titre:"Les faits divers — L'extraordinaire du quotidien", Contenu:"Les faits divers couvrent les événements locaux ou nationaux qui sortent de l'ordinaire : accidents, crimes, faits insolites… C'est souvent le premier contact du public avec la presse locale. La rubrique 'faits divers' est présente dans presque tous les journaux régionaux.", Points_Vigilance:"Attention à ne pas stigmatiser des groupes sociaux à travers le traitement des faits divers. La présomption d'innocence est un principe fondamental : une personne mise en cause n'est pas coupable avant jugement." },
    { Type:"DROPDOWN", Titre:"Présomption d'innocence — Quand s'applique-t-elle surtout ?", Question:"La présomption d'innocence est particulièrement importante dans le traitement des :", Réponse_A:"Articles culturels", Réponse_B:"Analyses économiques", Réponse_C:"Faits divers et affaires judiciaires", Réponse_D:"Résultats sportifs", Bonne_Réponse:"C", Explication:"La présomption d'innocence est un principe fondamental : toute personne est présumée innocente tant qu'un tribunal ne l'a pas condamnée. Ce principe est crucial dans les faits divers et affaires judiciaires, où les médias peuvent influencer l'opinion avant tout jugement." },
    { Type:"DRAGDROP", Titre:"Associer sujet et domaine — Élections = quel journalisme ?", Question:"Faites glisser : la couverture des élections législatives appartient au journalisme :", Réponse_A:"Économique", Réponse_B:"Culturel", Réponse_C:"Politique", Réponse_D:"Scientifique", Bonne_Réponse:"C", Explication:"Les élections sont le cœur du journalisme politique, qui couvre les institutions démocratiques, les partis, les campagnes électorales et les résultats de votes." },
    { Type:"TEXTE_LIBRE", Titre:"Vocabulaire — Comment s'appelle le journalisme sur l'environnement ?", Question:"Comment appelle-t-on le journalisme qui traite spécifiquement des enjeux climatiques, écologiques et environnementaux ?", Bonne_Réponse:"journalisme environnemental|journalisme écologique|journalisme vert|journalisme climatique", Explication:"Le journalisme environnemental (ou écologique / climatique) est en plein essor depuis la crise climatique. Il couvre le changement climatique, la biodiversité, la pollution, la transition énergétique… Il requiert de solides connaissances scientifiques." },
    { Type:"QCM", Titre:"Journalisme économique — Qui est son lectorat cible ?", Question:"La presse économique spécialisée comme Les Échos ou Capital s'adresse principalement à :", Réponse_A:"Des adolescents passionnés de jeux vidéo", Réponse_B:"Des professionnels, investisseurs et personnes intéressées par l'économie et les marchés", Réponse_C:"Des amateurs de musique classique", Réponse_D:"Des journalistes en formation", Bonne_Réponse:"B", Explication:"Les Échos, Capital ou Le Revenu sont des publications de presse économique qui s'adressent à un public de professionnels, cadres, investisseurs et personnes intéressées par les entreprises, les marchés financiers et la gestion. Leur vocabulaire est plus technique que la presse généraliste." },
    { Type:"PHRASE_TROUS", Titre:"Compléter la phrase — Le journalisme sportif et l'enquête", Question:"Au-delà des résultats sportifs, le journalisme sportif peut aussi pratiquer des enquêtes, notamment sur le ___ ou la corruption dans les fédérations.", Bonne_Réponse:"dopage", Explication:"Le journalisme sportif va bien au-delà des scores et classements. Des enquêtes importantes ont révélé des affaires de dopage (cyclisme, athlétisme), de corruption (football), de fraude financière (transferts)… c'est du journalisme d'investigation appliqué au domaine sportif." },
    { Type:"QCM", Titre:"Journalisme de société vs faits divers — Comment les distinguer ?", Question:"Quelle est la différence entre un fait divers et un article de société ?", Réponse_A:"Il n'y a aucune différence", Réponse_B:"Le fait divers traite un événement isolé et spectaculaire ; l'article de société analyse un phénomène social plus large", Réponse_C:"Le fait divers est national, l'article de société est local", Réponse_D:"Le fait divers est rédigé par des policiers, l'article de société par des sociologues", Bonne_Réponse:"B", Explication:"Un fait divers traite d'un événement particulier et souvent isolé (un vol, un accident…). Un article de société analyse des tendances plus larges (la montée de l'insécurité, les inégalités de revenus…). La différence est dans l'échelle et la profondeur d'analyse." }
],

"🌍 Les échelles géographiques": [
    { Type:"COURS", Titre:"L'information locale — La ville et le quartier", Contenu:"Le journalisme local couvre l'actualité d'une ville, d'un arrondissement ou d'un quartier. Il traite :\n• La vie municipale (conseil municipal, projets urbains)\n• La culture et les événements locaux\n• Les faits divers du secteur\n• Les portraits d'habitants\nExemples : Le Dauphiné Libéré (Isère), Le Télégramme (Bretagne), les pages locales d'Ouest-France.\nC'est souvent le premier niveau d'information qui touche directement la vie quotidienne des habitants.", Points_Vigilance:"Le journalisme local est essentiel à la démocratie locale. Son déclin (fermetures de journaux locaux faute de lecteurs et de revenus publicitaires) est une préoccupation réelle pour la vie démocratique des territoires." },
    { Type:"QCM", Titre:"Information locale — Quel exemple illustre ce niveau ?", Question:"Lequel de ces sujets relève typiquement du journalisme local ?", Réponse_A:"La guerre au Moyen-Orient", Réponse_B:"La réélection du président de la République", Réponse_C:"La construction d'une nouvelle médiathèque à Angers", Réponse_D:"La réforme du système fiscal national", Bonne_Réponse:"C", Explication:"La construction d'une médiathèque à Angers concerne les habitants d'une ville précise : c'est une information locale. Elle sera traitée par les journaux régionaux (Ouest-France, Courrier de l'Ouest…), pas par les médias nationaux." },
    { Type:"COURS", Titre:"L'information régionale — La région et ses enjeux", Contenu:"L'information régionale couvre une région administrative ou une zone géographique plus large que la commune. Elle traite :\n• Les décisions du conseil régional\n• L'économie régionale (emploi, entreprises locales)\n• Les grands projets d'infrastructure (LGV, autoroutes…)\n• Les enjeux culturels et sportifs régionaux\nLa Presse Quotidienne Régionale (PQR) : La Voix du Nord, Le Midi Libre, Sud-Ouest, Ouest-France…" },
    { Type:"QCM", Titre:"PQR — Quel journal est un exemple de presse régionale ?", Question:"Lequel de ces journaux est un exemple de Presse Quotidienne Régionale (PQR) ?", Réponse_A:"Le Monde", Réponse_B:"Libération", Réponse_C:"Le Figaro", Réponse_D:"Ouest-France", Bonne_Réponse:"D", Explication:"Ouest-France est le premier quotidien français par son tirage total (plus de 700 000 exemplaires/jour), mais c'est un journal régional (Normandie, Bretagne, Pays de la Loire…). Le Monde, Libération et Le Figaro sont des quotidiens nationaux." },
    { Type:"COURS", Titre:"L'information nationale — Le pays tout entier", Contenu:"L'information nationale couvre l'ensemble du territoire d'un pays. Elle traite :\n• La politique nationale (gouvernement, parlement, élections)\n• L'économie du pays\n• Les grandes tendances sociales et culturelles nationales\nLes médias nationaux français : Le Monde, Le Figaro, France Info, France 2, BFMTV…\nLe niveau national permet une vue d'ensemble des enjeux qui concernent tous les citoyens." },
    { Type:"QCM", Titre:"Information nationale — Comment la reconnaître ?", Question:"Un article traite de la réforme des retraites votée par le Parlement français. À quelle échelle se situe cette information ?", Réponse_A:"Locale", Réponse_B:"Régionale", Réponse_C:"Nationale", Réponse_D:"Internationale", Bonne_Réponse:"C", Explication:"La réforme des retraites concerne l'ensemble du territoire français et tous les travailleurs du pays : c'est une information nationale. Elle est couverte par les médias nationaux et traite d'une décision du Parlement, institution nationale." },
    { Type:"COURS", Titre:"L'information internationale — Hors frontières nationales", Contenu:"L'information internationale couvre les événements se déroulant hors des frontières nationales. Elle inclut :\n• Les conflits armés\n• Les relations diplomatiques entre pays\n• Les crises humanitaires\n• Les élections étrangères\n• Les événements économiques mondiaux\nLes correspondants étrangers et envoyés spéciaux sont les spécialistes de ce niveau. Des agences comme l'AFP, Reuters ou AP alimentent les médias du monde entier.", Points_Vigilance:"Couvrir l'international demande souvent de connaître les langues, cultures et contextes historiques des pays. Le risque est de regarder le monde uniquement avec un prisme occidental ou ethnocentrique." },
    { Type:"QCM", Titre:"Information internationale — Quel exemple illustre ce niveau ?", Question:"Lequel de ces sujets est une information internationale ?", Réponse_A:"L'inauguration d'une école à Bordeaux", Réponse_B:"Les élections présidentielles en France", Réponse_C:"Un accord de paix signé entre deux pays africains", Réponse_D:"La grève des transports à Lyon", Bonne_Réponse:"C", Explication:"Un accord de paix entre deux pays africains concerne des États souverains étrangers : c'est une information internationale. L'école à Bordeaux = local, les élections françaises = national, la grève à Lyon = local/régional." },
    { Type:"COURS", Titre:"L'information mondiale — Les enjeux qui concernent toute l'humanité", Contenu:"Certains sujets dépassent même l'échelle internationale pour concerner l'ensemble de l'humanité :\n• Le changement climatique\n• Les pandémies (ex : Covid-19)\n• La régulation des technologies numériques\n• La géopolitique mondiale (tensions entre grandes puissances)\nCe niveau nécessite une coopération entre journalistes de différents pays. Des médias mondiaux comme Al Jazeera, BBC World ou Deutsche Welle y jouent un rôle important." },
    { Type:"COURS", Titre:"Correspondant et envoyé spécial — Quelle différence ?", Contenu:"• Le correspondant local/régional : journaliste basé dans une ville pour couvrir l'actualité de sa zone en permanence.\n• Le correspondant étranger : journaliste installé de façon permanente dans un pays étranger pour couvrir la région.\n• L'envoyé spécial : journaliste dépêché ponctuellement à l'étranger (ou en région) pour couvrir un événement précis (élection, crise, catastrophe…).\nLa différence essentielle : le correspondant est permanent, l'envoyé spécial est temporaire." },
    { Type:"TEXTE_LIBRE", Titre:"Vocabulaire — Comment s'appelle le journaliste envoyé ponctuellement sur un événement ?", Question:"Comment appelle-t-on un journaliste envoyé ponctuellement dans un pays étranger pour couvrir un événement précis (guerre, élection, catastrophe) ?", Bonne_Réponse:"envoyé spécial|envoye special", Explication:"L'envoyé spécial est dépêché en mission pour un événement précis, à la différence du correspondant étranger qui réside de façon permanente dans un pays. Les envoyés spéciaux couvrent souvent des zones de conflit ou des crises majeures." },
    { Type:"DROPDOWN", Titre:"AFP — À qui fournit-elle des informations ?", Question:"L'AFP (Agence France-Presse) fournit ses dépêches à :", Réponse_A:"Uniquement aux médias français", Réponse_B:"Des médias du monde entier", Réponse_C:"Seulement aux chaînes de TV françaises", Réponse_D:"Uniquement aux journaux régionaux", Bonne_Réponse:"B", Explication:"L'AFP est l'une des trois grandes agences de presse mondiales (avec Reuters et Associated Press). Elle fournit dépêches, photos, vidéos et infographies à des milliers de médias dans plus de 150 pays. C'est un acteur majeur de l'information mondiale." },
    { Type:"DRAGDROP", Titre:"Classer l'échelle — La guerre en Ukraine, c'est quel niveau ?", Question:"Faites glisser : un reportage sur la guerre en Ukraine appartient à quelle échelle géographique ?", Réponse_A:"Locale", Réponse_B:"Régionale", Réponse_C:"Nationale", Réponse_D:"Internationale", Bonne_Réponse:"D", Explication:"La guerre en Ukraine est un conflit entre États (Russie et Ukraine) qui a des répercussions sur de nombreux autres pays : c'est une information internationale. Elle est couverte par des correspondants installés dans la région ou des envoyés spéciaux." },
    { Type:"PHRASE_TROUS", Titre:"Compléter la phrase — Le journalisme de proximité", Question:"Le journalisme ___ couvre l'actualité d'une ville ou d'un quartier et est essentiel à la vie démocratique des territoires.", Bonne_Réponse:"local|de proximité", Explication:"Le journalisme local (ou de proximité) informe les habitants sur ce qui se passe dans leur ville ou quartier : vie municipale, faits divers, événements locaux… Son déclin est une préoccupation pour la démocratie locale, car il est le seul à surveiller le pouvoir à l'échelle des communes." },
    { Type:"QCM", Titre:"Mondialisation de l'info — Quelle thématique dépasse les frontières ?", Question:"Lequel de ces sujets relève d'une information de dimension MONDIALE (et non simplement internationale) ?", Réponse_A:"L'élection présidentielle en Allemagne", Réponse_B:"Un conflit frontalier entre deux pays voisins", Réponse_C:"Le changement climatique et ses effets sur toute la planète", Réponse_D:"La grève des transports à Paris", Bonne_Réponse:"C", Explication:"Le changement climatique concerne l'ensemble de l'humanité, pas seulement un ou deux pays : c'est un enjeu de dimension mondiale ou globale. Il nécessite une coopération journalistique internationale et des médias capables d'analyser des phénomènes qui dépassent les frontières." },
