"👥 Les métiers de la presse": [
    { Type:"COURS", Titre:"Le reporter — Aller chercher l'info sur le terrain", Contenu:"Le reporter est le journaliste qui se déplace sur le terrain pour collecter l'information directement à la source. Il observe, interroge des témoins et rédige ses articles depuis le lieu même des événements. On distingue :\n• Le reporter d'images (ou photoreporter) : il raconte l'actualité en images.\n• Le reporter de guerre (ou grand reporter) : il couvre les conflits armés et zones de crise à l'étranger, souvent au péril de sa vie.\n• Le reporter local : il couvre l'actualité de proximité pour un titre régional.", Points_Vigilance:"Le reporter doit être présent sur le terrain : c'est ce qui distingue son travail d'un journaliste de bureau. Il ne peut pas inventer ni embellir ce qu'il observe." },
    { Type:"QCM", Titre:"Reporter — Quelle est sa spécificité par rapport aux autres journalistes ?", Question:"Ce qui distingue fondamentalement un reporter des autres journalistes, c'est qu'il :", Réponse_A:"Travaille uniquement à la radio", Réponse_B:"Se déplace sur le terrain pour observer et collecter l'information directement", Réponse_C:"Rédige uniquement des éditoriaux", Réponse_D:"Est toujours à l'étranger", Bonne_Réponse:"B", Explication:"La présence sur le terrain est la marque distinctive du reporter. Là où d'autres journalistes travaillent depuis la rédaction (en exploitant des dépêches, des communiqués, des sources téléphoniques), le reporter se rend lui-même sur les lieux pour observer, rencontrer des témoins et collecter l'information de première main." },
    { Type:"COURS", Titre:"Le rédacteur — Écrire et traiter l'information", Contenu:"Le rédacteur (ou journaliste rédacteur) est le cœur de la rédaction. Son travail consiste à :\n• Collecter des informations (via téléphone, agences de presse, internet, communiqués…)\n• Vérifier les faits auprès de plusieurs sources\n• Rédiger des articles clairs, précis et bien structurés\n• Respecter les formats imposés (brève, article, reportage…)\nLe rédacteur travaille souvent depuis la rédaction, contrairement au reporter qui est sur le terrain." },
    { Type:"COURS", Titre:"Le secrétaire de rédaction (SR) — Gardien de la qualité", Contenu:"Le secrétaire de rédaction (SR) est un métier peu visible du grand public mais essentiel. Il assure :\n• La relecture et la correction des articles (orthographe, grammaire, syntaxe)\n• La vérification de la cohérence des textes\n• Le titrage : rédiger les titres, sous-titres, chapeaux et légendes de photos\n• La mise en conformité avec la charte stylistique du journal\n• La coordination entre les journalistes et les maquettistes\nLe SR est souvent appelé 'le pompier de la rédaction' car il intervient en urgence pour corriger avant impression.", Points_Vigilance:"Le SR n'est pas seulement un correcteur : il réécrit, restructure, titre. C'est un expert du langage journalistique. Ne pas confondre avec un simple correcteur orthographique." },
    { Type:"QCM", Titre:"Secrétaire de rédaction — Quelle est sa mission principale ?", Question:"Parmi ces tâches, laquelle est au cœur du métier de secrétaire de rédaction ?", Réponse_A:"Aller interviewer des personnalités politiques", Réponse_B:"Relire, corriger, titrer les articles et préparer les pages avant publication", Réponse_C:"Gérer les comptes financiers du journal", Réponse_D:"Filmer les reportages télévisés", Bonne_Réponse:"B", Explication:"Le secrétaire de rédaction (SR) est le garant de la qualité formelle des textes avant publication. Il relit, corrige, retravaille les titres et sous-titres, vérifie les chapeaux et les légendes. C'est un métier exigeant qui mêle maîtrise de la langue et sens journalistique." },
    { Type:"COURS", Titre:"Le rédacteur en chef (REC) — Diriger la rédaction", Contenu:"Le rédacteur en chef (REC) est le responsable éditorial d'un journal ou d'une émission. Il :\n• Définit la ligne éditoriale (orientation générale du journal)\n• Décide des sujets à traiter et de leur hiérarchisation\n• Dirige la conférence de rédaction quotidienne\n• Valide les articles avant publication\n• Est responsable devant la loi du contenu publié (responsabilité pénale)\nDans un grand journal, il est secondé par des rédacteurs en chef adjoints et des chefs de service.", Points_Vigilance:"Le rédacteur en chef est légalement responsable de tout ce que publie son journal, même s'il n'a pas lui-même rédigé l'article. C'est pourquoi il dispose d'un droit de regard absolu sur les contenus." },
    { Type:"QCM", Titre:"Rédacteur en chef — Quelle est sa responsabilité légale ?", Question:"En France, le rédacteur en chef d'un journal est responsable devant la loi :", Réponse_A:"Uniquement des articles qu'il a lui-même rédigés", Réponse_B:"De l'ensemble du contenu publié dans son journal, même s'il ne l'a pas écrit", Réponse_C:"Seulement des erreurs orthographiques", Réponse_D:"Des résultats financiers du journal", Bonne_Réponse:"B", Explication:"En vertu de la loi sur la liberté de la presse de 1881, le directeur de la publication (souvent le rédacteur en chef) est pénalement responsable de l'ensemble des contenus publiés. Il peut être poursuivi pour diffamation, injure ou incitation à la haine, même s'il n'a pas rédigé l'article concerné." },
    { Type:"COURS", Titre:"Le chef de rubrique — Coordonner une section", Contenu:"Dans les grands journaux, la rédaction est organisée en rubriques thématiques (politique, économie, culture, sport, international…). Le chef de rubrique :\n• Gère l'équipe de journalistes de sa rubrique\n• Choisit les sujets à traiter dans son domaine\n• Assure la liaison avec le rédacteur en chef\n• Participe aux conférences de rédaction\n• Relit et valide les articles de son équipe avant transmission au SR\nC'est un journaliste expérimenté qui allie expertise éditoriale et gestion d'équipe." },
    { Type:"COURS", Titre:"Le maquettiste / directeur artistique (DA) — Mettre en page", Contenu:"Le maquettiste (ou directeur artistique dans les magazines) conçoit la mise en page visuelle du journal ou magazine. Il :\n• Choisit la disposition des textes, photos et infographies sur la page\n• Respecte la charte graphique du journal (polices, couleurs, format)\n• Travaille en étroite collaboration avec les SR et les photographes\n• Crée les gabarits de pages réutilisables\nSon objectif : rendre la lecture fluide, agréable et cohérente avec l'identité visuelle du titre.", Points_Vigilance:"Le maquettiste ne rédige pas les articles : c'est un professionnel de l'image et de la typographie. Dans les petites rédactions, le SR et le maquettiste peuvent être la même personne." },
    { Type:"QCM", Titre:"Maquettiste — Quel est son rôle dans la chaîne de fabrication ?", Question:"Quel est le rôle principal du maquettiste dans une rédaction ?", Réponse_A:"Rédiger les articles de fond", Réponse_B:"Photographier les événements d'actualité", Réponse_C:"Concevoir la mise en page visuelle du journal (textes, photos, titres)", Réponse_D:"Gérer les abonnements des lecteurs", Bonne_Réponse:"C", Explication:"Le maquettiste conçoit l'aspect visuel du journal : il place les textes, les photos et les titres sur la page de façon lisible et esthétique. Il travaille avec un logiciel de PAO (Publication Assistée par Ordinateur) comme InDesign. Son travail est invisible pour le lecteur, mais essentiel à la lisibilité du journal." },
    { Type:"COURS", Titre:"Le photojournaliste — Raconter en images", Contenu:"Le photojournaliste est un journaliste qui utilise la photographie comme moyen d'expression principal. Son travail consiste à :\n• Illustrer l'actualité par des images fortes et significatives\n• Assurer la couverture photographique d'événements (politique, sport, guerre, société…)\n• Respecter l'éthique : ne pas mettre en scène, ne pas manipuler les images\n• Rédiger des légendes précises pour contextualiser ses photos\nLes grandes agences photo (Magnum, Getty Images, Reuters) emploient des photojournalistes envoyés dans le monde entier.", Points_Vigilance:"Un photojournaliste ne peut pas modifier le contenu d'une photo (ajouter ou supprimer des éléments). Les retouches acceptées se limitent aux réglages techniques (luminosité, contraste). Toute manipulation est une faute déontologique grave." },
    { Type:"QCM", Titre:"Photojournaliste — Quelle manipulation lui est interdite ?", Question:"Lequel de ces actes est interdit au photojournaliste ?", Réponse_A:"Régler la luminosité de ses photos", Réponse_B:"Rédiger les légendes de ses images", Réponse_C:"Modifier le contenu d'une photo pour la rendre plus spectaculaire", Réponse_D:"Choisir le moment de déclenchement", Bonne_Réponse:"C", Explication:"La manipulation du contenu d'une photo (ajouter, supprimer ou déplacer des éléments) est une faute déontologique grave pour un photojournaliste. Des cas célèbres de manipulations ont conduit au licenciement de photographes et à des scandales médiatiques. La réalité doit être représentée fidèlement." },
    { Type:"COURS", Titre:"Le journaliste de données (data journalist) — L'info par les chiffres", Contenu:"Le journaliste de données (ou data journalist) est un métier récent, né avec la révolution numérique. Il :\n• Collecte et analyse des grandes quantités de données (statistiques, bases de données publiques…)\n• Crée des visualisations interactives (graphiques, cartes, infographies)\n• Détecte des tendances cachées dans les chiffres\n• Collabore avec des développeurs informatiques\nExemples de travaux : cartographier les inégalités sociales, visualiser les données électorales, analyser les dépenses publiques.\nC'est un profil très recherché dans les rédactions modernes." },
    { Type:"COURS", Titre:"Le pigiste — Travailler en indépendant", Contenu:"Le pigiste est un journaliste indépendant rémunéré à la 'pige', c'est-à-dire à l'article ou au sujet produit, sans être salarié fixe d'une rédaction. Il :\n• Propose des sujets à différents journaux ou travaille sur commande\n• Gère son propre emploi du temps et ses propres outils\n• Peut travailler pour plusieurs titres simultanément\n• Perçoit une rémunération par article publié\nLa pige est souvent la première étape de la carrière d'un journaliste. Elle offre de la liberté mais implique une instabilité financière.", Points_Vigilance:"Même rémunéré à la pige, le journaliste pigiste a les mêmes obligations déontologiques qu'un salarié : vérification des faits, protection des sources, honnêteté…" },
    { Type:"DRAGDROP", Titre:"Associer métier et mission — Qui corrige et titre les articles ?", Question:"Faites glisser : quel métier consiste à relire, corriger et rédiger les titres des articles avant publication ?", Réponse_A:"Le reporter", Réponse_B:"Le photojournaliste", Réponse_C:"Le secrétaire de rédaction", Réponse_D:"Le directeur artistique", Bonne_Réponse:"C", Explication:"Le secrétaire de rédaction (SR) est le spécialiste de la correction et du titrage. Il relit tous les articles avant publication, corrige les fautes, retravaille les formulations maladroites et rédige les titres, sous-titres et légendes." },
    { Type:"DROPDOWN", Titre:"Vocabulaire — Qui est responsable légal du journal ?", Question:"En France, la personne légalement responsable du contenu publié dans un journal s'appelle le :", Réponse_A:"Secrétaire de rédaction", Réponse_B:"Pigiste", Réponse_C:"Directeur de la publication", Réponse_D:"Maquettiste", Bonne_Réponse:"C", Explication:"Le directeur de la publication est la personne légalement responsable de tout ce que publie un journal. C'est souvent le rédacteur en chef ou le directeur général du titre. En cas de poursuite judiciaire (diffamation, injure…), c'est lui qui est mis en cause en priorité." },
    { Type:"QCM", Titre:"Conférence de rédaction — Qui la dirige ?", Question:"La conférence de rédaction quotidienne, où sont décidés les sujets du lendemain, est dirigée par :", Réponse_A:"Le secrétaire de rédaction", Réponse_B:"Le maquettiste", Réponse_C:"Le rédacteur en chef", Réponse_D:"Le pigiste", Bonne_Réponse:"C", Explication:"La conférence de rédaction est la réunion quotidienne (ou plusieurs fois par jour dans les rédactions web) où les journalistes proposent des sujets et où le rédacteur en chef décide des articles à traiter, de leur importance et de leur place dans le journal." },
    { Type:"TEXTE_LIBRE", Titre:"Vocabulaire — Comment s'appelle le journaliste payé à l'article ?", Question:"Comment appelle-t-on un journaliste indépendant rémunéré non pas par un salaire fixe, mais à l'article ou au sujet produit ?", Bonne_Réponse:"pigiste|un pigiste", Explication:"Le pigiste est rémunéré à la 'pige' : chaque article publié lui rapporte une somme convenue avec le journal. C'est un statut courant dans le journalisme, notamment en début de carrière. Les pigistes peuvent travailler pour plusieurs rédactions simultanément." },

    { Type:"QCM", Titre:"Data journalism — En quoi consiste ce métier récent ?", Question:"Qu'est-ce que le journalisme de données (data journalism) ?", Réponse_A:"Un journalisme qui ne s'appuie que sur des témoignages oraux", Réponse_B:"Un journalisme qui collecte et analyse des données chiffrées pour en tirer des informations et créer des visualisations", Réponse_C:"Un journalisme exclusivement diffusé sur des tablettes numériques", Réponse_D:"Un journalisme qui consiste à faire des sondages d'opinion", Bonne_Réponse:"B", Explication:"Le data journalism (journalisme de données) consiste à exploiter des bases de données pour révéler des tendances, des inégalités ou des dysfonctionnements invisibles à l'œil nu. Les data journalistes créent des graphiques interactifs, des cartes et des infographies pour rendre les données compréhensibles par le grand public." },

let currentScore = 0;
let maxQuizScore = 0;
let answeredQuestions = new Set();
let examMode = false;
let examUserAnswers = {};
let examTimerInterval = null;
let examSecondsLeft = 0;
let selectedExamDuration = 30;
let selectedExamSection = null;

const sections = [
    { name: "✍️ Testez vos connaissances", color: "#10b981" },
    { name: "📰 Les types de contenus",     color: "#2563eb" },
    { name: "📺 Les supports",              color: "#f97316" },
    { name: "🔍 Les domaines traités",      color: "#ec4899" },
    { name: "🌍 Les échelles géographiques",color: "#8b5cf6" },
    { name: "👥 Les métiers de la presse",  color: "#0891b2" }
];

const app = document.getElementById('app');
const menu = document.getElementById('menu');
const scoreBoard = document.getElementById('scoreBoard');
const finalBox = document.getElementById('finalResult');

// Création du menu
sections.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.innerText = s.name;
    btn.style.setProperty('--btn-color', s.color);
    btn.onclick = () => loadSection(s.name, btn);
    menu.appendChild(btn);
});

function toggleTheme() {
    document.body.classList.toggle('dark-mode');
    document.getElementById('themeBtn').innerText = document.body.classList.contains('dark-mode') ? "☀️" : "🌙";
}

function loadSection(name, btn) {
    currentScore = 0; maxQuizScore = 0;
    answeredQuestions.clear();
    finalBox.style.display = "none";
    document.querySelectorAll('.trophy-card').forEach(t => t.classList.remove('unlocked'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const data = DATA[name] || [];
    render(data);
}

function render(data) {
    let html = ""; let hasQuiz = false;

    data.forEach((row, i) => {
        // COURS
        if (row.Type === "COURS") {
            html += `<div class="fiche-bristol">
                <h2>${row.Titre || "Leçon"}</h2>
                <div style="white-space:pre-wrap; margin-top:20px; color:var(--texte-sec); font-size:1.05rem; line-height:1.8;">${row.Contenu || ""}</div>
                ${row.Points_Vigilance ? `<div class="vigilance-box"><strong>⚠️ Points de vigilance :</strong><br>${row.Points_Vigilance}</div>` : ""}
            </div>`;
        }
        // QUIZ
        else if (row.Question || ["QCM","DRAGDROP","DROPDOWN","TEXTE_LIBRE","PHRASE_TROUS"].includes((row.Type||"").toUpperCase())) {
            hasQuiz = true; maxQuizScore++;
            const bonne = (row.Bonne_Réponse || "").trim().toUpperCase();
            const format = (row.Format || row.Type || "QCM").toUpperCase();
            let quizContent = "";

            if (format === "DROPDOWN") {
                quizContent = `
                    <div class="quiz-title">${row.Titre || "Complétez :"} <br>${row.Question ? `<span style="font-weight:normal;">${row.Question}</span>` : ""}</div>
                    <select id="sel-${i}" class="quiz-select">
                        <option value="">-- Sélectionnez la bonne réponse --</option>
                        <option value="A">${row.Réponse_A || ""}</option>
                        <option value="B">${row.Réponse_B || ""}</option>
                        ${row.Réponse_C ? `<option value="C">${row.Réponse_C}</option>` : ''}
                        ${row.Réponse_D ? `<option value="D">${row.Réponse_D}</option>` : ''}
                    </select>
                    <button class="nav-btn" style="--btn-color:var(--violet); width:100%;" onclick="checkDropdown('${bonne}',${i})">Valider</button>`;
            }
            else if (format === "DRAGDROP") {
                quizContent = `
                    <div class="quiz-title">${row.Titre || "Glissez la bonne étiquette"}${row.Question ? `<br><span style="font-weight:normal;">${row.Question}</span>` : ""}</div>
                    <div class="drop-zone" id="dz-${i}" ondragover="allowDrop(event)" ondragleave="leaveDrop(event)" ondrop="dropAndCheck(event,'${bonne}',${i})">Déposez la réponse ici</div>
                    <div class="drag-container" id="drag-container-${i}">
                        <div class="drag-item" draggable="true" ondragstart="drag(event)" ontouchstart="touchDragStart(event)" ontouchmove="touchDragMove(event)" ontouchend="touchDragEnd(event)" id="drag-${i}-A" data-val="A" data-drop-id="${i}" data-correct="${bonne}">${row.Réponse_A || ""}</div>
                        <div class="drag-item" draggable="true" ondragstart="drag(event)" ontouchstart="touchDragStart(event)" ontouchmove="touchDragMove(event)" ontouchend="touchDragEnd(event)" id="drag-${i}-B" data-val="B" data-drop-id="${i}" data-correct="${bonne}">${row.Réponse_B || ""}</div>
                        ${row.Réponse_C ? `<div class="drag-item" draggable="true" ondragstart="drag(event)" ontouchstart="touchDragStart(event)" ontouchmove="touchDragMove(event)" ontouchend="touchDragEnd(event)" id="drag-${i}-C" data-val="C" data-drop-id="${i}" data-correct="${bonne}">${row.Réponse_C}</div>` : ''}
                        ${row.Réponse_D ? `<div class="drag-item" draggable="true" ondragstart="drag(event)" ontouchstart="touchDragStart(event)" ontouchmove="touchDragMove(event)" ontouchend="touchDragEnd(event)" id="drag-${i}-D" data-val="D" data-drop-id="${i}" data-correct="${bonne}">${row.Réponse_D}</div>` : ''}
                    </div>`;
            }
            else if (format === "TEXTE_LIBRE") {
                const bonneTexte = (row.Bonne_Réponse || "").trim();
                quizContent = `
                    <div class="quiz-title">${row.Titre || row.Question}</div>
                    <div class="text-libre-wrap">
                        <input type="text" id="tl-${i}" class="text-libre-input" placeholder="Votre réponse…"
                            onkeydown="if(event.key==='Enter') checkTexteLibre(${i})"
                            data-correct="${bonneTexte.replace(/"/g,'&quot;')}">
                        <button class="text-libre-btn" id="tl-btn-${i}" onclick="checkTexteLibre(${i})">Valider ✓</button>
                    </div>
                    ${bonneTexte.includes("|") ? '<div style="font-size:0.85rem;color:var(--texte-sec);margin-top:8px;">💡 Plusieurs réponses acceptées</div>' : ""}`;
            }
            else if (format === "PHRASE_TROUS") {
                const bonneTexte = (row.Bonne_Réponse || "").trim();
                const question = row.Question || row.Titre || "";
                let trouIndex = 0;
                const answers = bonneTexte.split("|").map(a => a.trim());
                const phraseHtml = question.replace(/___/g, () => {
                    const ans = (answers[trouIndex] || "").replace(/"/g, "&quot;");
                    const tid = trouIndex; trouIndex++;
                    return `<input type="text" class="trou-input" id="trou-${i}-${tid}" data-answer="${ans}" placeholder="  ?  " onkeydown="if(event.key==='Enter') checkPhraseTrous(${i})">`;
                });
                quizContent = `<div class="quiz-title">${row.Titre || "Complétez la phrase"}</div>
                    <div class="phrase-trous">${phraseHtml}</div>
                    <button class="valider-trous-btn" id="trous-btn-${i}" onclick="checkPhraseTrous(${i})">Valider ✓</button>`;
            }
            else { // QCM par défaut
                quizContent = `
                    <div class="quiz-title">${row.Titre || row.Question}</div>
                    <div class="btn-grid" data-correct="${bonne}">
                        <button class="opt-btn" id="btn-${i}-A" data-id="${i}" data-letter="A" data-correct="${bonne}" onclick="check('A','${bonne}',${i})">A. ${row.Réponse_A || ""}</button>
                        <button class="opt-btn" id="btn-${i}-B" data-id="${i}" data-letter="B" data-correct="${bonne}" onclick="check('B','${bonne}',${i})">B. ${row.Réponse_B || ""}</button>
                        ${row.Réponse_C ? `<button class="opt-btn" id="btn-${i}-C" data-id="${i}" data-letter="C" data-correct="${bonne}" onclick="check('C','${bonne}',${i})">C. ${row.Réponse_C}</button>` : ''}
                        ${row.Réponse_D ? `<button class="opt-btn" id="btn-${i}-D" data-id="${i}" data-letter="D" data-correct="${bonne}" onclick="check('D','${bonne}',${i})">D. ${row.Réponse_D}</button>` : ''}
                    </div>`;
            }

            html += `<div class="card-quiz" id="q-card-${i}">
                ${quizContent}
                <div id="ex-${i}" class="expli-box"><strong>💡 Explication</strong><br>${row.Explication || "Bien joué !"}</div>
            </div>`;
        }
    });

    app.innerHTML = html || "<p style='text-align:center;'>Aucune donnée trouvée.</p>";
    scoreBoard.innerHTML = hasQuiz ? `Score : 0 / ${maxQuizScore}` : "";
}

// --- FONCTIONS DE VALIDATION ---

function check(click, correct, id) {
    if (answeredQuestions.has(id)) return;
    const btnClicked = document.getElementById('btn-' + id + '-' + click);
    if (examMode) {
        if (examUserAnswers[id]) {
            const prev = document.getElementById('btn-' + id + '-' + examUserAnswers[id].value);
            if (prev) prev.classList.remove('selected-exam');
        }
        examUserAnswers[id] = { type:'qcm', value:click, correct };
        if (btnClicked) btnClicked.classList.add('selected-exam');
        return;
    }
    answeredQuestions.add(id);
    ['A','B','C','D'].forEach(l => { const b = document.getElementById('btn-'+id+'-'+l); if(b) b.disabled = true; });
    if (click === correct) { currentScore++; btnClicked.classList.add('success'); confetti({particleCount:20, spread:40, origin:{y:0.7}}); }
    else { btnClicked.classList.add('error'); const bc = document.getElementById('btn-'+id+'-'+correct); if(bc) bc.classList.add('success'); }
    const expli = document.getElementById('ex-' + id);
    if(expli) expli.style.display = "block";
    updateScoreBoard();
}

function checkDropdown(correct, id) {
    if (answeredQuestions.has(id)) return;
    const sel = document.getElementById('sel-' + id);
    if (!sel.value) { alert("Veuillez sélectionner une réponse !"); return; }
    if (examMode) { examUserAnswers[id] = {type:'dropdown', value:sel.value, correct}; sel.classList.add('selected-exam'); return; }
    answeredQuestions.add(id);
    sel.disabled = true;
    const expli = document.getElementById('ex-' + id);
    if (sel.value === correct) { currentScore++; sel.classList.add('success'); confetti({particleCount:20, spread:40, origin:{y:0.7}}); }
    else { sel.classList.add('error'); if(expli) expli.innerHTML = `<span style="color:#991b1b;">❌ La bonne réponse était <strong>${correct}</strong>.</span><br><br>` + expli.innerHTML; }
    if(expli) expli.style.display = "block";
    updateScoreBoard();
}

function allowDrop(ev) { ev.preventDefault(); ev.currentTarget.classList.add('dragover'); }
function leaveDrop(ev) { ev.currentTarget.classList.remove('dragover'); }
function drag(ev) { ev.dataTransfer.setData("elementId", ev.target.id); ev.dataTransfer.setData("value", ev.target.getAttribute("data-val")); }

function dropAndCheck(ev, correct, id) {
    ev.preventDefault();
    const dz = ev.currentTarget;
    dz.classList.remove('dragover');
    if (answeredQuestions.has(id)) return;
    const draggedId = ev.dataTransfer.getData("elementId");
    const draggedVal = ev.dataTransfer.getData("value");
    if (!draggedId) return;
    const draggedEl = document.getElementById(draggedId);
    if (examMode) {
        const prev = dz.querySelector('.drag-item');
        if (prev) { const c = document.getElementById('drag-container-'+id); if(c) { prev.classList.remove('selected-exam'); c.appendChild(prev); } }
        dz.innerHTML = ""; dz.appendChild(draggedEl);
        dz.classList.add('selected-exam'); draggedEl.classList.add('selected-exam');
        examUserAnswers[id] = {type:'dragdrop', value:draggedVal, correct};
        return;
    }
    dz.innerHTML = ""; dz.appendChild(draggedEl);
    answeredQuestions.add(id);
    const container = document.getElementById('drag-container-' + id);
    if(container) Array.from(container.children).forEach(c => { c.setAttribute('draggable','false'); c.style.opacity="0.5"; c.style.cursor="not-allowed"; });
    draggedEl.setAttribute('draggable','false'); draggedEl.style.opacity="1";
    const expli = document.getElementById('ex-' + id);
    if (draggedVal === correct) { currentScore++; dz.classList.add('success'); draggedEl.classList.add('success'); confetti({particleCount:20, spread:40, origin:{y:0.7}}); }
    else { dz.classList.add('error'); draggedEl.classList.add('error'); const ce = document.getElementById('drag-'+id+'-'+correct); if(ce) ce.classList.add('success'); }
    if(expli) expli.style.display = "block";
    updateScoreBoard();
}

function normaliser(str) {
    return str.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/['']/g,"'");
}

function checkTexteLibre(id) {
    if (answeredQuestions.has(id)) return;
    const input = document.getElementById('tl-' + id);
    const btn   = document.getElementById('tl-btn-' + id);
    const expli = document.getElementById('ex-' + id);
    const userVal = input.value;
    if (!userVal.trim()) { input.focus(); return; }
    if (examMode) { examUserAnswers[id] = {type:'texte_libre', value:userVal, correct:input.dataset.correct}; input.style.borderColor='var(--violet)'; input.style.fontWeight='700'; return; }
    answeredQuestions.add(id); input.disabled = true; btn.disabled = true;
    const corrects = input.dataset.correct.split("|").map(normaliser);
    if (corrects.includes(normaliser(userVal))) { input.classList.add('success'); currentScore++; confetti({particleCount:20,spread:40,origin:{y:0.7}}); }
    else { input.classList.add('error'); if(expli) expli.innerHTML = '<span style="color:#991b1b;">❌ La bonne réponse : <strong>' + input.dataset.correct + '</strong></span><br><br>' + expli.innerHTML; }
    if(expli) expli.style.display = 'block';
    updateScoreBoard();
}

function checkPhraseTrous(id) {
    if (answeredQuestions.has(id)) return;
    const btn = document.getElementById('trous-btn-' + id);
    const expli = document.getElementById('ex-' + id);
    const inputs = document.querySelectorAll('.trou-input[id^="trou-'+id+'-"]');
    let allFilled = true;
    inputs.forEach(inp => { if (!inp.value.trim()) allFilled = false; });
    if (!allFilled) { inputs.forEach(inp => { if (!inp.value.trim()) inp.focus(); }); return; }
    if (examMode) {
        const vals = {}; inputs.forEach(inp => { vals[inp.id] = inp.value; });
        examUserAnswers[id] = {type:'phrase_trous', values:vals, inputs:Array.from(inputs).map(inp=>({id:inp.id,correct:inp.dataset.answer}))};
        inputs.forEach(inp => { inp.style.borderBottomColor='var(--violet)'; inp.style.fontWeight='700'; });
        return;
    }
    answeredQuestions.add(id); btn.disabled = true;
    let allCorrect = true; let nbCorrect = 0;
    inputs.forEach(inp => {
        inp.disabled = true;
        const corrects = inp.dataset.answer.split("|").map(normaliser);
        if (corrects.includes(normaliser(inp.value))) { inp.classList.add('success'); nbCorrect++; }
        else { inp.classList.add('error'); allCorrect = false; const hint = document.createElement('div'); hint.style.cssText='font-size:0.8rem;color:#991b1b;text-align:center;margin-top:2px;'; hint.textContent='→ '+inp.dataset.answer; inp.after(hint); }
    });
    if (allCorrect) { currentScore++; confetti({particleCount:20,spread:40,origin:{y:0.7}}); }
    else { if(expli) expli.innerHTML='<span style="color:#991b1b;">❌ '+nbCorrect+' trou(s) correct(s) sur '+inputs.length+'</span><br><br>'+expli.innerHTML; }
    if(expli) expli.style.display='block';
    updateScoreBoard();
}

function updateScoreBoard() {
    scoreBoard.innerHTML = `Score : ${currentScore} / ${maxQuizScore}`;
    const activeSection = document.querySelector('.nav-btn.active')?.innerText;
    if (activeSection) localStorage.setItem(`score_${activeSection}`, `${currentScore} / ${maxQuizScore}`);
    if (currentScore === 1) unlockTrophy('t-first');
    if (maxQuizScore > 0) {
        const ratio = currentScore / maxQuizScore;
        if (ratio >= 0.5) unlockTrophy('t-half');
        if (ratio === 1 && answeredQuestions.size === maxQuizScore) unlockTrophy('t-perfect');
    }
    if (answeredQuestions.size === maxQuizScore && maxQuizScore > 0) showFinalResult();
}

function unlockTrophy(tid) {
    const t = document.getElementById(tid);
    if (t && !t.classList.contains('unlocked')) { t.classList.add('unlocked'); confetti({particleCount:50,spread:60,origin:{y:0.3}}); }
}

function showFinalResult() {
    const percent = Math.round((currentScore / maxQuizScore) * 100);
    let msg = "", color = "";
    if(percent===100) { msg="INCROYABLE ! 🏆"; color="#10b981"; unlockTrophy('t-speed'); }
    else if(percent>=75) { msg="Très bon travail ! ✨"; color="#2563eb"; }
    else if(percent>=50) { msg="Pas mal, continue ! 👍"; color="#f59e0b"; }
    else { msg="Il faut encore réviser... 📚"; color="#ef4444"; }
    finalBox.innerHTML = `<h3>Résultat Final</h3><span class="big-score" style="color:${color}">${currentScore} / ${maxQuizScore}</span><p>${msg}</p><button class="nav-btn" style="--btn-color:var(--violet)" onclick="window.scrollTo({top:0,behavior:'smooth'})">Remonter</button>`;
    finalBox.style.display = "block";
    setTimeout(() => finalBox.scrollIntoView({behavior:"smooth"}), 200);
}

// --- MODE EXAMEN ---
function toggleExamMode() { examMode ? exitExamMode() : startExamSetup(); }

function startExamSetup() {
    const existing = document.getElementById('examSetupPanel');
    if (existing) { existing.remove(); return; }
    const activeBtn = document.querySelector('.nav-btn.active');
    const activeName = activeBtn ? activeBtn.innerText : sections[0].name;

    document.querySelector('.nav-menu').after(setupDiv);

function selectExamSection(btn, name) {
    document.querySelectorAll('#sectionOptions .timer-opt-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected'); selectedExamSection = name;
}
function selectDuration(btn, minutes) {
    document.querySelectorAll('#timerOptions .timer-opt-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected'); selectedExamDuration = minutes;
}

function launchExamMode() {
    const setupPanel = document.getElementById('examSetupPanel');
    if (setupPanel) setupPanel.remove();
    examMode = true; examUserAnswers = {};
    document.getElementById('examModeBtn').classList.add('active');
    document.getElementById('examModeBtn').innerText = '❌ Quitter examen';
    document.body.classList.add('exam-active');
    currentScore = 0; answeredQuestions.clear();
    const targetName = selectedExamSection || (document.querySelector('.nav-btn.active')?.innerText);
    const targetBtn = Array.from(document.querySelectorAll('.nav-btn')).find(b=>b.innerText===targetName);
    if (targetName && targetBtn) loadSection(targetName, targetBtn);
    setTimeout(() => { startExamTimer(); addExamBannerAndSubmitBtn(); }, 500);
}

function startExamTimer() {
    examSecondsLeft = selectedExamDuration * 60;
    updateTimerDisplay();
    examTimerInterval = setInterval(() => {
        examSecondsLeft--;
        updateTimerDisplay();
        if (examSecondsLeft <= 0) { clearInterval(examTimerInterval); alert('⏰ Temps écoulé !'); submitExam(); }
    }, 1000);
}
function updateTimerDisplay() {
    const el = document.getElementById('examTimerDisplay');
    if (!el) return;
    const m = Math.floor(examSecondsLeft/60), s = examSecondsLeft%60;
    el.innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if (examSecondsLeft<=60) el.classList.add('warning'); else el.classList.remove('warning');
}
function addExamBannerAndSubmitBtn() {
    const existing = document.getElementById('examBanner'); if(existing) existing.remove();
    const banner = document.createElement('div');
    banner.id = 'examBanner'; banner.className = 'exam-banner';
    banner.innerHTML = `<span>📝 Mode Examen — ${selectedExamDuration} min</span><span class="exam-timer" id="examTimerDisplay">--:--</span><button onclick="submitExam()" style="background:white;color:#7c3aed;border:none;padding:8px 16px;border-radius:20px;font-weight:800;cursor:pointer;">✅ Terminer</button>`;
    document.body.insertBefore(banner, document.body.firstChild);
    updateTimerDisplay();
    const submitBtn = document.createElement('button');
    submitBtn.id='examSubmitBtn'; submitBtn.className='exam-submit-btn';
    submitBtn.innerHTML='✅ Terminer et corriger mon examen'; submitBtn.onclick=submitExam;
    finalBox.before(submitBtn);
}

function exitExamMode(keepResults) {
    examMode = false; clearInterval(examTimerInterval);
    document.getElementById('examModeBtn').classList.remove('active');
    document.getElementById('examModeBtn').innerText = '📝 Mode Examen';
    document.body.classList.remove('exam-active');
    const banner = document.getElementById('examBanner'); if(banner) banner.remove();
    const submitBtn = document.getElementById('examSubmitBtn'); if(submitBtn) submitBtn.remove();
    const setupPanel = document.getElementById('examSetupPanel'); if(setupPanel) setupPanel.remove();
    if (!keepResults) {
        const activeBtn = document.querySelector('.nav-btn.active');
        if (activeBtn) { const name = activeBtn.innerText; loadSection(name, activeBtn); }
    }
}

function submitExam() {
    clearInterval(examTimerInterval);
    examMode = false;
    let score = 0; const total = maxQuizScore;
    Object.entries(examUserAnswers).forEach(([idStr, ans]) => {
        const id = parseInt(idStr);
        const expli = document.getElementById('ex-' + id);
        if (ans.type === 'qcm') {
            ['A','B','C','D'].forEach(l => { const b=document.getElementById('btn-'+id+'-'+l); if(!b)return; b.disabled=true; b.classList.remove('selected-exam'); if(l===ans.correct)b.classList.add('success'); else if(l===ans.value&&ans.value!==ans.correct)b.classList.add('error'); });
            if(ans.value===ans.correct) score++;
        } else if (ans.type === 'dropdown') {
            const sel = document.getElementById('sel-'+id); if(sel){sel.disabled=true;sel.classList.remove('selected-exam'); if(ans.value===ans.correct){sel.classList.add('success');score++;}else{sel.classList.add('error');if(expli)expli.innerHTML=`<span style="color:#991b1b;">❌ Bonne réponse : <strong>${ans.correct}</strong>.</span><br><br>`+expli.innerHTML;}}
        } else if (ans.type === 'texte_libre') {
            const input=document.getElementById('tl-'+id); const btn2=document.getElementById('tl-btn-'+id);
            if(input){input.disabled=true;if(btn2)btn2.disabled=true; const corrects=ans.correct.split('|').map(normaliser); if(corrects.includes(normaliser(ans.value))){input.classList.add('success');score++;}else{input.classList.add('error');if(expli)expli.innerHTML='<span style="color:#991b1b;">❌ Bonne réponse : <strong>'+ans.correct+'</strong></span><br><br>'+expli.innerHTML;}}
        } else if (ans.type === 'phrase_trous') {
            const btn2=document.getElementById('trous-btn-'+id); if(btn2)btn2.disabled=true;
            let allCorrect2=true; let nb=0;
            (ans.inputs||[]).forEach(item=>{const inp=document.getElementById(item.id);if(!inp)return;inp.disabled=true;const corrects=item.correct.split('|').map(normaliser);const userVal=ans.values[item.id]||''; if(corrects.includes(normaliser(userVal))){inp.classList.add('success');nb++;}else{inp.classList.add('error');allCorrect2=false;const hint=document.createElement('div');hint.style.cssText='font-size:0.8rem;color:#991b1b;text-align:center;margin-top:2px;';hint.textContent='→ '+item.correct;inp.after(hint);}});
            if(allCorrect2){score++;}else{if(expli)expli.innerHTML='<span style="color:#991b1b;">❌ '+nb+' trou(s) correct(s) sur '+(ans.inputs||[]).length+'</span><br><br>'+expli.innerHTML;}
        } else if (ans.type === 'dragdrop') {
            const dz=document.getElementById('dz-'+id); if(!dz)return;
            const draggedEl=dz.querySelector('.drag-item'); dz.classList.remove('selected-exam');
            if(draggedEl)draggedEl.classList.remove('selected-exam');
            if(ans.value===ans.correct){dz.classList.add('success');if(draggedEl)draggedEl.classList.add('success');score++;}else{dz.classList.add('error');if(draggedEl)draggedEl.classList.add('error');const ce=document.getElementById('drag-'+id+'-'+ans.correct);if(ce)ce.classList.add('success');}
        }
        if(expli) expli.style.display='block';
    });
    for(let i=0;i<total+50;i++){['A','B','C','D'].forEach(l=>{const b=document.getElementById('btn-'+i+'-'+l);if(b&&!b.disabled)b.disabled=true;});const sel=document.getElementById('sel-'+i);if(sel&&!sel.disabled)sel.disabled=true;}
    document.querySelectorAll('.expli-box').forEach(e=>e.style.display='block');
    currentScore = score; scoreBoard.innerHTML = `Score : ${score} / ${total}`;
    const activeSection = document.querySelector('.nav-btn.active')?.innerText;
    if(activeSection) localStorage.setItem(`score_${activeSection}`,`${score} / ${total}`);
    const percent = total>0?Math.round((score/total)*100):0;
    let msg='',color='';
    if(percent===100){msg='INCROYABLE ! 🏆 Parfait !';color='#10b981';}else if(percent>=75){msg='Très bon résultat ! ✨';color='#2563eb';}else if(percent>=50){msg='Pas mal, continue ! 👍';color='#f59e0b';}else{msg='Il faut encore réviser... 📚';color='#ef4444';}
    finalBox.innerHTML=`<h3>📋 Résultat de l'Examen</h3><span class="big-score" style="color:${color}">${score} / ${total}</span><p style="font-size:1.3rem;">${msg}</p><button class="nav-btn" style="--btn-color:var(--violet)" onclick="exitExamMode(true); window.scrollTo({top:0,behavior:'smooth'})">Relire les corrections ↑</button>`;
    finalBox.style.display='block';
    const submitBtn=document.getElementById('examSubmitBtn'); if(submitBtn)submitBtn.remove();
    const banner=document.getElementById('examBanner'); if(banner) banner.innerHTML=`<span>📝 Examen terminé</span><span style="font-weight:800;">${score} / ${total} (${percent}%)</span><span></span>`;
    setTimeout(()=>finalBox.scrollIntoView({behavior:'smooth'}),200);
    if(percent===100) confetti({particleCount:150,spread:90,origin:{y:0.4}});
}

// --- DRAG & DROP TACTILE ---
let touchDragEl=null, touchClone=null, touchOffsetX=0, touchOffsetY=0;

function touchDragStart(ev) {
    const el=ev.currentTarget; const id=parseInt(el.getAttribute('data-drop-id'));
    if(!examMode&&answeredQuestions.has(id)) return;
    touchDragEl=el; const touch=ev.touches[0]; const rect=el.getBoundingClientRect();
    touchOffsetX=touch.clientX-rect.left; touchOffsetY=touch.clientY-rect.top;
    touchClone=el.cloneNode(true);
    touchClone.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;z-index:9999;opacity:0.85;pointer-events:none;transform:scale(1.05) rotate(-2deg);transition:none;margin:0;box-shadow:0 8px 25px rgba(0,0,0,0.25);`;
    document.body.appendChild(touchClone); el.style.opacity='0.35'; ev.preventDefault();
}
function touchDragMove(ev) {
    if(!touchClone) return; const touch=ev.touches[0];
    touchClone.style.left=(touch.clientX-touchOffsetX)+'px'; touchClone.style.top=(touch.clientY-touchOffsetY)+'px';
    document.querySelectorAll('.drop-zone').forEach(dz=>dz.classList.remove('dragover'));
    const elUnder=getElementUnderTouch(touch.clientX,touch.clientY);
    if(elUnder?.classList.contains('drop-zone')) elUnder.classList.add('dragover');
    ev.preventDefault();
}
function touchDragEnd(ev) {
    if(!touchClone||!touchDragEl) return;
    const touch=ev.changedTouches[0];
    touchClone.remove(); touchClone=null; touchDragEl.style.opacity='1';
    document.querySelectorAll('.drop-zone').forEach(dz=>dz.classList.remove('dragover'));
    const elUnder=getElementUnderTouch(touch.clientX,touch.clientY);
    if(elUnder?.classList.contains('drop-zone')) {
        const correct=touchDragEl.getAttribute('data-correct'); const val=touchDragEl.getAttribute('data-val');
        const id=parseInt(touchDragEl.getAttribute('data-drop-id')); const dropId=elUnder.id.replace('dz-','');
        if(parseInt(dropId)===id) {
            if(examMode) {
                const prev=elUnder.querySelector('.drag-item');
                if(prev){const c=document.getElementById('drag-container-'+id);if(c){prev.classList.remove('selected-exam');prev.style.opacity='1';c.appendChild(prev);}}
                elUnder.innerHTML=''; elUnder.appendChild(touchDragEl); elUnder.classList.add('selected-exam'); touchDragEl.classList.add('selected-exam');
                examUserAnswers[id]={type:'dragdrop',value:val,correct};
            } else {
                if(answeredQuestions.has(id)) return;
                elUnder.innerHTML=''; elUnder.appendChild(touchDragEl);
                const container=document.getElementById('drag-container-'+id);
                if(container) Array.from(container.children).forEach(c=>{c.setAttribute('draggable','false');c.style.opacity='0.5';c.style.cursor='not-allowed';c.ontouchstart=null;});
                touchDragEl.setAttribute('draggable','false'); touchDragEl.style.opacity='1'; touchDragEl.ontouchstart=null;
                if(val===correct){currentScore++;elUnder.classList.add('success');touchDragEl.classList.add('success');confetti({particleCount:20,spread:40,origin:{y:0.7}});}
                else{elUnder.classList.add('error');touchDragEl.classList.add('error');const ce=document.getElementById('drag-'+id+'-'+correct);if(ce)ce.classList.add('success');}
                answeredQuestions.add(id);
                const expli=document.getElementById('ex-'+id); if(expli)expli.style.display='block';
                updateScoreBoard();
            }
        }
    }
    touchDragEl=null;
}
function getElementUnderTouch(x,y) {
    if(touchClone) touchClone.style.display='none';
    let el=document.elementFromPoint(x,y);
    if(touchClone) touchClone.style.display='';
    let current=el;
    while(current&&current!==document.body){if(current.classList&&current.classList.contains('drop-zone'))return current;current=current.parentElement;}
    return el;
}

// ==========================================
// --- ENVOI DES SCORES ---
// ==========================================

// 📧 Adresse email du professeur — modifiez cette ligne
const TEACHER_EMAIL = "grandnimportequoi76@gmail.com";

const QUIZ_SECTIONS_NAMES = sections.map(s => s.name);

function openSendModal() {
    // Construire le récapitulatif des scores
    let scoresHtml = '';
    let totalCorrect = 0, totalQuestions = 0;
    let sectionsCompleted = 0;

    QUIZ_SECTIONS_NAMES.forEach(name => {
        const score = localStorage.getItem('score_' + name) || null;
        const done = score !== null;
        if (done) {
            sectionsCompleted++;
            const parts = score.split(' / ');
            if (parts.length === 2) {
                totalCorrect   += parseInt(parts[0]) || 0;
                totalQuestions += parseInt(parts[1]) || 0;
            }
        }
        scoresHtml += `
            <div class="score-line">
                <span>${name}</span>
                <span class="score-val ${done ? 'score-done' : 'score-pending'}">${done ? score : 'Non complété'}</span>
            </div>`;
    });

    const pct = totalQuestions > 0 ? Math.round((totalCorrect / totalQuestions) * 100) : 0;
    const sur100 = `${totalCorrect} / ${totalQuestions} (${pct}%)`;

    scoresHtml += `
        <div class="score-line score-total" style="margin-top:8px; padding-top:12px; border-top: 2px solid var(--card-border); border-bottom:none;">
            <span>📊 Score global</span>
            <span style="color:var(--violet)">${totalQuestions > 0 ? sur100 : '—'}</span>
        </div>`;

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'sendModal';
    overlay.innerHTML = `
        <div class="modal-box">
            <h3>📤 Envoyer mes résultats</h3>
            <p>Entrez votre prénom et nom, puis choisissez comment envoyer vos scores au professeur.</p>

            <label class="modal-input-label" for="studentName">Votre prénom et nom</label>
            <input type="text" class="modal-input" id="studentName"
                placeholder="ex : Marie Dupont"
                onkeydown="if(event.key==='Enter') sendByEmail()">

            <div class="modal-scores-preview">${scoresHtml}</div>

            <div class="modal-btn-row" style="flex-direction:column; gap:10px;">
                <button class="modal-btn-primary" id="sendEmailBtn" onclick="sendByEmail()">
                    ✉️ Ouvrir dans ma messagerie
                </button>
                <button class="modal-btn-primary" onclick="copyToClipboard()" style="background:var(--vert);">
                    📋 Copier mes résultats
                </button>
                <button class="modal-btn-secondary" onclick="document.getElementById('sendModal').remove()">
                    Fermer
                </button>
            </div>

            <div class="send-status" id="sendStatus"></div>
            <div class="copy-confirm" id="copyConfirm">✅ Résultats copiés ! Collez-les dans un message à votre professeur.</div>
        </div>
    `;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    document.getElementById('studentName').focus();
}

function getScoreText(name) {
    // Build plain-text summary for email/clipboard
    const now = new Date().toLocaleString('fr-FR');
    let lines = [];
    lines.push('=== Résultats — Le Journalisme ===');
    lines.push('Élève : ' + name);
    lines.push('Date  : ' + now);
    lines.push('');

    let totalCorrect = 0, totalQuestions = 0;
    QUIZ_SECTIONS_NAMES.forEach(sname => {
        const score = localStorage.getItem('score_' + sname) || 'Non complété';
        lines.push(sname + ' : ' + score);
        if (score !== 'Non complété') {
            const parts = score.split(' / ');
            if (parts.length === 2) {
                totalCorrect   += parseInt(parts[0]) || 0;
                totalQuestions += parseInt(parts[1]) || 0;
            }
        }
    });

    const pct = totalQuestions > 0 ? Math.round((totalCorrect / totalQuestions) * 100) : 0;
    lines.push('');
    lines.push('Score global : ' + totalCorrect + ' / ' + totalQuestions + ' (' + pct + '%)');
    return lines.join('\n');
}

function sendByEmail() {
    const name = (document.getElementById('studentName')?.value || '').trim();
    const input = document.getElementById('studentName');
    if (!name) {
        input.style.borderColor = '#ef4444';
        input.focus();
        return;
    }
    input.style.borderColor = '';

    const text = getScoreText(name);
    const subject = encodeURIComponent('[Journalisme] Résultats de ' + name);
    const body    = encodeURIComponent(text);
    const mailto  = 'mailto:' + TEACHER_EMAIL + '?subject=' + subject + '&body=' + body;

    // Ouvrir le client mail
    window.location.href = mailto;

    // Confirmation visuelle
    const status = document.getElementById('sendStatus');
    if (status) {
        status.className = 'send-status ok';
        status.innerHTML = '✅ Votre messagerie devrait s\'ouvrir avec l\'email prêt à envoyer.<br><span style="font-size:0.85rem;font-weight:400;">Si rien ne se passe, utilisez le bouton <strong>Copier</strong> et collez dans un email.</span>';
        status.style.display = 'block';
    }
}

function copyToClipboard() {
    const name = (document.getElementById('studentName')?.value || '').trim();
    const input = document.getElementById('studentName');
    if (!name) {
        input.style.borderColor = '#ef4444';
        input.focus();
        return;
    }
    input.style.borderColor = '';

    const text = getScoreText(name);
    navigator.clipboard.writeText(text).then(() => {
        const confirm = document.getElementById('copyConfirm');
        const status  = document.getElementById('sendStatus');
        if (confirm) confirm.style.display = 'block';
        if (status)  status.style.display  = 'none';
    }).catch(() => {
        // Fallback textarea pour anciens navigateurs
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;top:-999px;left:-999px;';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
        const confirm = document.getElementById('copyConfirm');
        if (confirm) confirm.style.display = 'block';
    });
}
