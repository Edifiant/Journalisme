// ================================================
// BUILD QUIZ
// ================================================
function buildQuiz(row,i,qNum) {
    const t=(row.Type||'QCM').toUpperCase();
    const correct=(row.Bonne_Réponse||'').trim().toUpperCase();

    const card = document.createElement('div');
    card.className='quiz-card'; card.id='qcard-'+i;

    let typLabel='QCM', typClass='badge-qcm';
    if(t==='DROPDOWN'){typLabel='Menu déroulant';typClass='badge-drop';}
    if(t==='DRAGDROP'){typLabel='Glisser-déposer';typClass='badge-drag';}
    if(t==='TEXTE_LIBRE'){typLabel='Réponse libre';typClass='badge-text';}
    if(t==='PHRASE_TROUS'){typLabel='Texte à trous';typClass='badge-fill';}

    const header = document.createElement('div');
    header.className='quiz-card-header';
    header.innerHTML=`<span class="quiz-type-badge ${typClass}">${typLabel}</span>
        <span class="quiz-num">Q${qNum}</span>`;

    const check = document.createElement('div');
    check.className='answered-check'; check.textContent='✓';
    header.appendChild(check);

    const body = document.createElement('div');
    body.className='quiz-body';

    const titleEl = document.createElement('div');
    titleEl.className='quiz-q';
    titleEl.textContent = row.Titre || row.Question || '';
    if(row.Titre && row.Question && row.Titre !== row.Question) {
        titleEl.innerHTML += `<div class="quiz-subtitle">${row.Question}</div>`;
    }
    body.appendChild(titleEl);

    // Build question body
    if(t==='QCM') {
        body.appendChild(buildQCM(row,i,correct));
    } else if(t==='DROPDOWN') {
        body.appendChild(buildDropdown(row,i,correct));
    } else if(t==='DRAGDROP') {
        body.appendChild(buildDragDrop(row,i,correct));
    } else if(t==='TEXTE_LIBRE') {
        body.appendChild(buildTexteLibre(row,i));
    } else if(t==='PHRASE_TROUS') {
        body.appendChild(buildPhraseTrous(row,i));
    }

    // Explication
    const expli = document.createElement('div');
    expli.className='expli-box'; expli.id='ex-'+i;
    expli.innerHTML=`<strong>💡 Explication</strong><br>${row.Explication||'Bien joué !'}`;
    body.appendChild(expli);

    card.appendChild(header);
    card.appendChild(body);
    return card;
}

// ================================================
// QCM
// ================================================
function buildQCM(row,i,correct) {
    const grid = document.createElement('div');
    grid.className='opts-grid';
    ['A','B','C','D'].forEach(l => {
        if(!row['Réponse_'+l]) return;
        const btn=document.createElement('button');
        btn.className='opt'; btn.id='opt-'+i+'-'+l;
        btn.innerHTML=`<span class="opt-letter">${l}</span><span>${row['Réponse_'+l]}</span>`;
        btn.onclick=()=>checkQCM(l,correct,i);
        grid.appendChild(btn);
    });
    return grid;
}

function checkQCM(clicked,correct,id) {
    if(answered.has(id)) return;
    const btn=document.getElementById('opt-'+id+'-'+clicked);
    if(examMode) {
        // deselect prev
        ['A','B','C','D'].forEach(l=>{const b=document.getElementById('opt-'+id+'-'+l);if(b)b.classList.remove('exam-sel');});
        if(btn) btn.classList.add('exam-sel');
        examAnswers[id]={type:'qcm',value:clicked,correct};
        return;
    }
    answered.add(id);
    ['A','B','C','D'].forEach(l=>{const b=document.getElementById('opt-'+id+'-'+l);if(b)b.disabled=true;});
    if(clicked===correct){score++;btn.classList.add('correct');fireConfetti();}
    else{btn.classList.add('wrong');const cb=document.getElementById('opt-'+id+'-'+correct);if(cb)cb.classList.add('correct');}
    showExpli(id); markAnswered(id); updateScoreUI();
}

// ================================================
// DROPDOWN
// ================================================
function buildDropdown(row,i,correct) {
    const wrap=document.createElement('div');
    const sel=document.createElement('select');
    sel.className='quiz-select'; sel.id='sel-'+i;
    sel.innerHTML=`<option value="">— Sélectionnez une réponse —</option>`;
    ['A','B','C','D'].forEach(l=>{
        if(!row['Réponse_'+l]) return;
        sel.innerHTML+=`<option value="${l}">${row['Réponse_'+l]}</option>`;
    });
    const btn=document.createElement('button');
    btn.className='validate-btn'; btn.textContent='Valider ✓';
    btn.onclick=()=>checkDropdown(correct,i);
    wrap.appendChild(sel); wrap.appendChild(btn);
    return wrap;
}

function checkDropdown(correct,id) {
    if(answered.has(id)) return;
    const sel=document.getElementById('sel-'+id);
    if(!sel.value){sel.focus();return;}
    if(examMode){
        examAnswers[id]={type:'dropdown',value:sel.value,correct};
        sel.classList.add('exam-sel'); return;
    }
    answered.add(id); sel.disabled=true;
    if(sel.value===correct){score++;sel.classList.add('correct');fireConfetti();}
    else{sel.classList.add('wrong');}
    showExpli(id); markAnswered(id); updateScoreUI();
}

// ================================================
// DRAG & DROP
// ================================================
function buildDragDrop(row,i,correct) {
    const wrap=document.createElement('div');
    const dz=document.createElement('div');
    dz.className='drop-zone'; dz.id='dz-'+i;
    dz.textContent='Déposez la bonne réponse ici ↓';
    dz.ondragover=e=>{e.preventDefault();dz.classList.add('dragover');};
    dz.ondragleave=()=>dz.classList.remove('dragover');
    dz.ondrop=e=>dropCheck(e,correct,i);
    wrap.appendChild(dz);

    const cont=document.createElement('div');
    cont.className='drag-container'; cont.id='dc-'+i;
    ['A','B','C','D'].forEach(l=>{
        if(!row['Réponse_'+l]) return;
        const it=document.createElement('div');
        it.className='drag-item';
        it.id='di-'+i+'-'+l;
        it.draggable=true;
        it.dataset.val=l; it.dataset.drop=i; it.dataset.correct=correct;
        it.textContent=row['Réponse_'+l];
        it.ondragstart=e=>{e.dataTransfer.setData('id',it.id);e.dataTransfer.setData('val',l);};
        it.ontouchstart=touchStart;
        it.ontouchmove=touchMove;
        it.ontouchend=touchEnd;
        cont.appendChild(it);
    });
    wrap.appendChild(cont);
    return wrap;
}

function dropCheck(e,correct,id) {
    e.preventDefault();
    const dz=document.getElementById('dz-'+id);
    dz.classList.remove('dragover');
    if(answered.has(id)) return;
    const elId=e.dataTransfer.getData('id');
    const val=e.dataTransfer.getData('val');
    if(!elId) return;
    const el=document.getElementById(elId);
    if(!el) return;
    if(examMode){
        const prev=dz.querySelector('.drag-item');
        if(prev){const c=document.getElementById('dc-'+id);if(c){prev.classList.remove('exam-sel');c.appendChild(prev);}}
        dz.innerHTML=''; dz.appendChild(el);
        dz.classList.add('exam-sel'); el.classList.add('exam-sel');
        examAnswers[id]={type:'dragdrop',value:val,correct};
        return;
    }
    dz.innerHTML=''; dz.appendChild(el);
    answered.add(id);
    const cont=document.getElementById('dc-'+id);
    if(cont) [...cont.children].forEach(c=>{c.draggable=false;c.style.opacity='.45';c.ontouchstart=null;});
    el.draggable=false; el.ontouchstart=null;
    if(val===correct){score++;dz.classList.add('correct');el.classList.add('correct');fireConfetti();}
    else{dz.classList.add('wrong');el.classList.add('wrong');const ce=document.getElementById('di-'+id+'-'+correct);if(ce)ce.classList.add('correct');}
    showExpli(id); markAnswered(id); updateScoreUI();
}

// ================================================
// TEXTE LIBRE
// ================================================
function buildTexteLibre(row,i) {
    const wrap=document.createElement('div');
    wrap.className='text-libre-wrap';
    const inp=document.createElement('input');
    inp.type='text'; inp.className='text-libre-input'; inp.id='tl-'+i;
    inp.placeholder='Votre réponse…';
    inp.dataset.correct=(row.Bonne_Réponse||'').trim();
    inp.onkeydown=e=>{if(e.key==='Enter')checkTexte(i);};
    const btn=document.createElement('button');
    btn.className='validate-btn'; btn.id='tlb-'+i; btn.textContent='Valider ✓';
    btn.onclick=()=>checkTexte(i);
    wrap.appendChild(inp); wrap.appendChild(btn);
    if((row.Bonne_Réponse||'').includes('|')) {
        const hint=document.createElement('div');
        hint.className='hint-text'; hint.textContent='💡 Plusieurs réponses acceptées';
        const outer=document.createElement('div');
        outer.appendChild(wrap); outer.appendChild(hint);
        return outer;
    }
    return wrap;
}

function checkTexte(id) {
    if(answered.has(id)) return;
    const inp=document.getElementById('tl-'+id);
    const btn=document.getElementById('tlb-'+id);
    if(!inp.value.trim()){inp.focus();return;}
    if(examMode){examAnswers[id]={type:'texte',value:inp.value,correct:inp.dataset.correct};inp.style.borderColor='var(--accent2)';return;}
    answered.add(id); inp.disabled=true; btn.disabled=true;
    const corrects=inp.dataset.correct.split('|').map(norm);
    if(corrects.includes(norm(inp.value))){score++;inp.classList.add('correct');fireConfetti();}
    else{inp.classList.add('wrong');const ex=document.getElementById('ex-'+id);if(ex)ex.innerHTML=`<strong>❌ Bonne réponse : ${inp.dataset.correct}</strong><br><br>`+ex.innerHTML;}
    showExpli(id); markAnswered(id); updateScoreUI();
}

// ================================================
// PHRASE À TROUS
// ================================================
function buildPhraseTrous(row,i) {
    const wrap=document.createElement('div');
    const question=row.Question||row.Titre||'';
    const answers=(row.Bonne_Réponse||'').split('|').map(a=>a.trim());
    let ti=0;
    const html=question.replace(/___/g,()=>{
        const ans=(answers[ti]||'').replace(/"/g,'&quot;');
        const id2=ti; ti++;
        return `<input type="text" class="trou-input" id="tr-${i}-${id2}" data-ans="${ans}" placeholder="?" onkeydown="if(event.key==='Enter')checkTrous(${i})">`;
    });
    const p=document.createElement('div'); p.className='phrase-trous'; p.innerHTML=html;
    const btn=document.createElement('button');
    btn.className='validate-btn'; btn.id='trb-'+i; btn.textContent='Valider ✓';
    btn.style.marginTop='10px';
    btn.onclick=()=>checkTrous(i);
    wrap.appendChild(p); wrap.appendChild(btn);
    return wrap;
}

function checkTrous(id) {
    if(answered.has(id)) return;
    const inputs=[...document.querySelectorAll(`.trou-input[id^="tr-${id}-"]`)];
    if(inputs.some(inp=>!inp.value.trim())){inputs.find(inp=>!inp.value.trim())?.focus();return;}
    if(examMode){
        const vals={}; inputs.forEach(inp=>vals[inp.id]=inp.value);
        examAnswers[id]={type:'trous',vals,inputs:inputs.map(inp=>({id:inp.id,correct:inp.dataset.ans}))};
        inputs.forEach(inp=>{inp.style.borderBottomColor='var(--accent2)';inp.style.fontWeight='700';});
        return;
    }
    answered.add(id);
    document.getElementById('trb-'+id).disabled=true;
    let allOk=true;
    inputs.forEach(inp=>{
        inp.disabled=true;
        const ok=inp.dataset.ans.split('|').map(norm).includes(norm(inp.value));
        if(ok) inp.classList.add('correct');
        else{inp.classList.add('wrong');allOk=false;const h=document.createElement('div');h.style.cssText='font-size:.75rem;color:var(--accent);text-align:center;margin-top:2px;';h.textContent='→ '+inp.dataset.ans;inp.after(h);}
    });
    if(allOk){score++;fireConfetti();}
    else{const ex=document.getElementById('ex-'+id);if(ex)ex.innerHTML=`<strong>❌ Vérifiez les réponses soulignées en rouge</strong><br><br>`+ex.innerHTML;}
    showExpli(id); markAnswered(id); updateScoreUI();
}

// ================================================
// HELPERS
// ================================================
function norm(s){return s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/['']/g,"'");}
function showExpli(id){const e=document.getElementById('ex-'+id);if(e)e.style.display='block';}
function markAnswered(id){const c=document.getElementById('qcard-'+id);if(c)c.classList.add('answered');}
function fireConfetti(){confetti({particleCount:22,spread:45,origin:{y:.7},colors:['#1a7a4a','#2c5f8a','#c0392b']});}

function updateScoreUI() {
    document.getElementById('scoreNum').textContent=score;
    document.getElementById('scoreMax').textContent=maxScore;
    const pct=maxScore>0?Math.round((score/maxScore)*100):0;
    if(score>=1) unlockTrophy('t-first');
    if(pct>=50)  unlockTrophy('t-half');
    if(pct===100 && answered.size===maxScore) {unlockTrophy('t-perfect');unlockTrophy('t-speed');}
    // save
    const aName=document.querySelector('.snav-btn.active')?.textContent;
    if(aName) localStorage.setItem('score_'+aName,score+' / '+maxScore);
    updateProgressUI();
    if(answered.size===maxScore && maxScore>0) showFinal();
}

function updateProgressUI(){
    const n=answered.size, tot=maxScore;
    const pct=tot>0?Math.round((n/tot)*100):0;
    document.getElementById('progressFill').style.width=pct+'%';
    document.getElementById('progressLabel').textContent=n+' / '+tot+' répondus';
}

function unlockTrophy(id){
    const t=document.getElementById(id);
    if(t&&!t.classList.contains('unlocked')){
        t.classList.add('unlocked');
        confetti({particleCount:40,spread:55,origin:{y:.25},colors:['#b8860b','#daa520']});
    }
}

function showFinal(){
    const pct=Math.round((score/maxScore)*100);
    let msg='',col='';
    if(pct===100){msg='INCROYABLE ! 🏆 Score parfait !';col='var(--accent3)';}
    else if(pct>=75){msg='Très bon travail ! ✨';col='var(--accent2)';}
    else if(pct>=50){msg='Pas mal, continue ! 👍';col='var(--gold)';}
    else{msg='Il faut encore réviser… 📚';col='var(--accent)';}
    const fb=document.getElementById('finalBox');
    fb.innerHTML=`<div style="font-size:1rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;">Résultat Final</div>
        <span class="final-score" style="color:${col}">${score} <span style="font-size:2rem;color:var(--ink3)">/ ${maxScore}</span></span>
        <p class="final-msg">${msg}</p>
        <button class="back-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ Remonter</button>`;
    fb.style.display='block';
    setTimeout(()=>fb.scrollIntoView({behavior:'smooth'}),200);
    if(pct===100) confetti({particleCount:150,spread:80,origin:{y:.4}});
}

function selectSection(btn,name){
    document.querySelectorAll('#setupSections .timer-btn').forEach(b=>b.classList.remove('sel'));
    btn.classList.add('sel'); examSection=name;
}
function selectDur(btn,m){
    document.querySelectorAll('#setupDurations .timer-btn').forEach(b=>b.classList.remove('sel'));
    btn.classList.add('sel'); examDuration=m;
}
function removeExamSetup(){const e=document.getElementById('examSetup');if(e)e.remove();}

function launchExam(){
    removeExamSetup();
    examMode=true; examAnswers={};
    const btn=document.getElementById('examBtn');
    btn.classList.add('exam-active');
    btn.innerHTML='❌ <span>Quitter</span>';
    document.body.classList.add('exam-active');

    score=0; answered.clear();
    const targetBtn=[...document.querySelectorAll('.snav-btn')].find(b=>b.textContent===(examSection||SECTIONS[0].name));
    if(targetBtn) loadSection(examSection||SECTIONS[0].name,targetBtn);

    setTimeout(()=>{
        addExamBanner();
        addExamSubmitBtn();
        startExamTimer();
    },300);
}

function addExamBanner(){
    removeExamBanner();
    const b=document.createElement('div');
    b.className='exam-banner'; b.id='examBanner';
    b.innerHTML=`<span>📝 Mode Examen — ${examDuration} min</span>
        <span class="exam-timer" id="examTimerDisplay">--:--</span>
        <button class="exam-end-btn" onclick="finishExam()">✅ Terminer</button>`;
    document.body.insertBefore(b,document.body.firstChild);
}
function removeExamBanner(){const b=document.getElementById('examBanner');if(b)b.remove();}
function addExamSubmitBtn(){
    removeExamSubmitBtn();
    const btn=document.createElement('button');
    btn.className='exam-submit-btn'; btn.id='examSubmitBtn';
    btn.textContent='✅ Terminer et voir les corrections';
    btn.onclick=finishExam;
    document.getElementById('finalBox').before(btn);
}
function removeExamSubmitBtn(){const b=document.getElementById('examSubmitBtn');if(b)b.remove();}

function startExamTimer(){
    examLeft=examDuration*60;
    updateTimerDisp();
    examTimer=setInterval(()=>{
        examLeft--;
        updateTimerDisp();
        if(examLeft<=0){clearInterval(examTimer);alert('⏰ Temps écoulé !');finishExam();}
    },1000);
}
function updateTimerDisp(){
    const el=document.getElementById('examTimerDisplay');
    if(!el) return;
    const m=Math.floor(examLeft/60),s=examLeft%60;
    el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    if(examLeft<=60) el.classList.add('warn'); else el.classList.remove('warn');
}

function exitExam(keepResults){
    examMode=false; clearInterval(examTimer);
    const btn=document.getElementById('examBtn');
    btn.classList.remove('exam-active');
    btn.innerHTML='📝 <span>Examen</span>';
    document.body.classList.remove('exam-active');
    removeExamBanner(); removeExamSubmitBtn(); removeExamSetup();
    if(!keepResults){
        const active=document.querySelector('.snav-btn.active');
        if(active) loadSection(active.textContent,active);
    }
}

function finishExam(){
    clearInterval(examTimer);
    examMode=false;
    let s2=0;

    Object.entries(examAnswers).forEach(([idStr,ans])=>{
        const id=parseInt(idStr);
        const ex=document.getElementById('ex-'+id);

        if(ans.type==='qcm'){
            ['A','B','C','D'].forEach(l=>{
                const b=document.getElementById('opt-'+id+'-'+l);
                if(!b)return; b.disabled=true; b.classList.remove('exam-sel');
                if(l===ans.correct) b.classList.add('correct');
                else if(l===ans.value) b.classList.add('wrong');
            });
            if(ans.value===ans.correct) s2++;
        }
        else if(ans.type==='dropdown'){
            const sel=document.getElementById('sel-'+id);
            if(sel){sel.disabled=true;sel.classList.remove('exam-sel');
                if(ans.value===ans.correct){sel.classList.add('correct');s2++;}
                else{sel.classList.add('wrong');if(ex)ex.innerHTML=`<strong>❌ Bonne réponse : ${ans.correct}</strong><br><br>`+ex.innerHTML;}
            }
        }
        else if(ans.type==='texte'){
            const inp=document.getElementById('tl-'+id);
            const btn2=document.getElementById('tlb-'+id);
            if(inp){inp.disabled=true;if(btn2)btn2.disabled=true;
                const ok=ans.correct.split('|').map(norm).includes(norm(ans.value));
                if(ok){inp.classList.add('correct');s2++;}
                else{inp.classList.add('wrong');if(ex)ex.innerHTML=`<strong>❌ Bonne réponse : ${ans.correct}</strong><br><br>`+ex.innerHTML;}
            }
        }
        else if(ans.type==='trous'){
            const b2=document.getElementById('trb-'+id);if(b2)b2.disabled=true;
            let allOk=true;
            (ans.inputs||[]).forEach(item=>{
                const inp=document.getElementById(item.id);if(!inp)return;
                inp.disabled=true;
                const ok=item.correct.split('|').map(norm).includes(norm(ans.vals[item.id]||''));
                if(ok) inp.classList.add('correct');
                else{inp.classList.add('wrong');allOk=false;const h=document.createElement('div');h.style.cssText='font-size:.75rem;color:var(--accent);text-align:center;margin-top:2px;';h.textContent='→ '+item.correct;inp.after(h);}
            });
            if(allOk) s2++;
        }
        else if(ans.type==='dragdrop'){
            const dz=document.getElementById('dz-'+id);
            if(dz){const dragEl=dz.querySelector('.drag-item');dz.classList.remove('exam-sel');
                if(dragEl)dragEl.classList.remove('exam-sel');
                if(ans.value===ans.correct){dz.classList.add('correct');if(dragEl)dragEl.classList.add('correct');s2++;}
                else{dz.classList.add('wrong');if(dragEl)dragEl.classList.add('wrong');const ce=document.getElementById('di-'+id+'-'+ans.correct);if(ce)ce.classList.add('correct');}
            }
        }

        if(ex) ex.style.display='block';
        markAnswered(id);
    });

    // disable all unanswered
    for(let ii=0;ii<currentData.length;ii++){
        ['A','B','C','D'].forEach(l=>{const b=document.getElementById('opt-'+ii+'-'+l);if(b&&!b.disabled)b.disabled=true;});
        const sel=document.getElementById('sel-'+ii);if(sel&&!sel.disabled)sel.disabled=true;
        const tlb=document.getElementById('tlb-'+ii);if(tlb&&!tlb.disabled)tlb.disabled=true;
        const trb=document.getElementById('trb-'+ii);if(trb&&!trb.disabled)trb.disabled=true;
    }
    document.querySelectorAll('.expli-box').forEach(e=>e.style.display='block');

    score=s2;
    document.getElementById('scoreNum').textContent=s2;
    const aName=document.querySelector('.snav-btn.active')?.textContent;
    if(aName) localStorage.setItem('score_'+aName,s2+' / '+maxScore);

    const pct=maxScore>0?Math.round((s2/maxScore)*100):0;
    let msg='',col='';
    if(pct===100){msg='PARFAIT ! 🏆';col='var(--accent3)';}
    else if(pct>=75){msg='Très bon résultat ! ✨';col='var(--accent2)';}
    else if(pct>=50){msg='Pas mal, continue ! 👍';col='var(--gold)';}
    else{msg='Il faut encore réviser… 📚';col='var(--accent)';}

    const fb=document.getElementById('finalBox');
    fb.innerHTML=`<div style="font-size:.9rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;">📋 Résultat de l'Examen</div>
        <span class="final-score" style="color:${col}">${s2} <span style="font-size:2rem;color:var(--ink3)">/ ${maxScore}</span></span>
        <p class="final-msg">${msg}</p>
        <button class="back-btn" onclick="exitExam(true);window.scrollTo({top:0,behavior:'smooth'})">Relire les corrections ↑</button>`;
    fb.style.display='block';

    removeExamSubmitBtn();
    const banner=document.getElementById('examBanner');
    if(banner) banner.innerHTML=`<span>📝 Examen terminé</span><span style="font-size:1.1rem;font-weight:900;">${s2} / ${maxScore} (${pct}%)</span><button class="exam-end-btn" onclick="exitExam(true);window.scrollTo({top:0,behavior:'smooth'})">Voir corrections</button>`;

    setTimeout(()=>fb.scrollIntoView({behavior:'smooth'}),200);
    if(pct===100) confetti({particleCount:150,spread:80,origin:{y:.4}});
}

// TOUCH DRAG & DROP
// ================================================
let tEl=null,tClone=null,tOx=0,tOy=0;
function touchStart(e){
    const el=e.currentTarget;
    const did=parseInt(el.dataset.drop);
    if(!examMode&&answered.has(did))return;
    tEl=el;
    const touch=e.touches[0],rect=el.getBoundingClientRect();
    tOx=touch.clientX-rect.left; tOy=touch.clientY-rect.top;
    tClone=el.cloneNode(true);
    tClone.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;z-index:9999;opacity:.85;pointer-events:none;transform:scale(1.06) rotate(-1.5deg);transition:none;margin:0;box-shadow:0 8px 28px rgba(0,0,0,.25);`;
    document.body.appendChild(tClone); el.style.opacity='.3'; e.preventDefault();
}
function touchMove(e){
    if(!tClone)return;
    const touch=e.touches[0];
    tClone.style.left=(touch.clientX-tOx)+'px'; tClone.style.top=(touch.clientY-tOy)+'px';
    document.querySelectorAll('.drop-zone').forEach(dz=>dz.classList.remove('dragover'));
    const under=elUnder(touch.clientX,touch.clientY);
    if(under?.classList.contains('drop-zone')) under.classList.add('dragover');
    e.preventDefault();
}
function touchEnd(e){
    if(!tClone||!tEl)return;
    const touch=e.changedTouches[0];
    tClone.remove(); tClone=null; tEl.style.opacity='1';
    document.querySelectorAll('.drop-zone').forEach(dz=>dz.classList.remove('dragover'));
    const under=elUnder(touch.clientX,touch.clientY);
    if(under?.classList.contains('drop-zone')){
        const id=parseInt(tEl.dataset.drop);
        const dropId=parseInt(under.id.replace('dz-',''));
        if(dropId===id){
            const val=tEl.dataset.val,correct=tEl.dataset.correct;
            const fakeEvt={preventDefault:()=>{},dataTransfer:{getData:(k)=>k==='id'?tEl.id:val}};
            dropCheck(fakeEvt,correct,id);
        }
    }
    tEl=null;
}
function elUnder(x,y){
    if(tClone)tClone.style.display='none';
    let el=document.elementFromPoint(x,y);
    if(tClone)tClone.style.display='';
    while(el&&el!==document.body){if(el.classList?.contains('drop-zone'))return el;el=el.parentElement;}
    return el;
}

function downloadResults(){
    let scoresHtml='',tot=0,totQ=0,hasData=false;
    SECTIONS.forEach(s=>{
        const sc=localStorage.getItem('score_'+s.name)||null;
        const done=sc!==null;
        if(done){hasData=true;const p=sc.split(' / ');if(p.length===2){tot+=parseInt(p[0])||0;totQ+=parseInt(p[1])||0;}}
        scoresHtml+=`<div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #e8e2d8;"><span style="color:#4a4035;">${s.name}</span><span style="color:#2c5f8a;font-weight:800;">${done?sc:'Non complété'}</span></div>`;
    });
    if(!hasData){alert('Complète au moins un quiz pour générer ton bilan !');return;}
    const pct=totQ>0?Math.round((tot/totQ)*100):0;
    const note=totQ>0?`${tot} / ${totQ} (${pct}%)`:'—';
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:Georgia,serif;background:#f7f4ef;display:flex;justify-content:center;padding:40px;}.card{background:#fff;max-width:600px;width:100%;padding:50px;border:1px solid #ddd8ce;border-top:8px solid #c0392b;}.title{font-size:2rem;color:#c0392b;margin-bottom:4px;}.sub{color:#8a7d6e;margin-bottom:32px;font-family:sans-serif;font-size:.9rem;}.global{text-align:center;padding:24px;background:#f7f4ef;border-radius:12px;margin-bottom:28px;border:2px solid #2c5f8a;}.gn{font-size:3.5rem;font-weight:900;color:#2c5f8a;}.gp{color:#8a7d6e;font-size:.9rem;margin-top:4px;}.date{color:#8a7d6e;font-size:.8rem;margin-top:28px;text-align:center;font-style:italic;}</style></head><body><div class="card"><div class="title">📰 Le Journalisme</div><div class="sub">Bilan des révisions interactives</div><div class="global"><div class="gn">${note}</div><div class="gp">Score global</div></div>${scoresHtml}<div class="date">Généré le ${new Date().toLocaleString('fr-FR')}</div></div></body></html>`;
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));
    a.download='Bilan_Journalisme.html'; a.click();
}

function openSendModal(){
    const overlay=document.createElement('div');
    overlay.className='modal-overlay'; overlay.id='sendModal';
    overlay.innerHTML=`<div class="modal-box">
        <h3>📤 Envoyer mes résultats</h3>
        <p>Écris ton prénom et ton nom, puis clique sur le bouton. Tes résultats seront envoyés directement au professeur !</p>
        <label class="modal-input-label" for="studentName">Ton prénom et ton nom</label>
        <input type="text" class="modal-input" id="studentName" placeholder="ex : Marie Dupont" onkeydown="if(event.key==='Enter')sendToSheet()">
        <div class="modal-btns">
            <button class="modal-btn-prim green" id="sendSheetBtn" onclick="sendToSheet()">🚀 Envoyer au professeur</button>
            <button class="modal-btn-sec" onclick="document.getElementById('sendModal').remove()">Fermer</button>
        </div>
        <div class="send-status" id="sendStatus"></div>
    </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
    document.getElementById('studentName').focus();
}

function sendToSheet(){
    const name = (document.getElementById('studentName')?.value||'').trim();
    const st = document.getElementById('sendStatus');
    const btn = document.getElementById('sendSheetBtn');
    if(!name){
        document.getElementById('studentName').style.borderColor='var(--accent)';
        document.getElementById('studentName').focus();
        return;
    }
    document.getElementById('studentName').style.borderColor='';

    // Collecte des scores
    const scores = {};
    SECTIONS.forEach(s => {
        const sc = localStorage.getItem('score_'+s.name);
        if(sc) scores[s.name] = sc;
    });

    // UI : chargement
    btn.disabled = true;
    btn.textContent = '⏳ Envoi en cours…';
    st.className='send-status';
    st.style.display='none';

    fetch(SHEET_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, scores })
    })
    .then(() => {
        btn.textContent = '✅ Envoyé !';
        btn.style.background = 'var(--accent3)';
        st.className = 'send-status ok';
        st.innerHTML = '✅ Résultats envoyés au professeur avec succès !<br><span style="font-weight:400;font-size:.8rem">Tu peux fermer cette fenêtre.</span>';
        st.style.display = 'block';
        // Fermeture auto après 3s
        setTimeout(()=>{
            const m = document.getElementById('sendModal');
            if(m) m.remove();
        }, 3000);
    })
    .catch(() => {
        btn.disabled = false;
        btn.textContent = '🚀 Envoyer au professeur';
        st.className = 'send-status err';
        st.innerHTML = '❌ Erreur de connexion. Vérifie ta connexion internet et réessaie.';
        st.style.display = 'block';
    });
}
